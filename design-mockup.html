function Stat({ value, suffix, ...rest }) {
  const label = rest["c-label"];
  return (
    <div className="c-stat">
      <div className="c-stat-v">{value}{suffix && <span className="c-stat-suffix">{suffix}</span>}</div>
      <div className="c-stat-l">{label}</div>
    </div>
  );
}

function FilmStrip({ sessions, nowMs }) {
  const first = new Date(sessions[0].startedAt).getTime();
  const last = nowMs;
  const total = last - first;

  const allSegs = sessions.flatMap(s => {
    const end = s.endedAt ? new Date(s.endedAt).getTime() : nowMs;
    return H.toSegments(s.events).map(seg => ({ ...seg, end: Math.min(seg.end, end), session: s }));
  });

  const startHour = new Date(first); startHour.setMinutes(0,0,0);
  const endHour = new Date(last); endHour.setMinutes(60,0,0);
  const ticks = [];
  for (let t = startHour.getTime(); t <= endHour.getTime(); t += 60*60*1000) ticks.push(t);

  return (
    <div className="c-strip">
      <div className="c-strip-track">
        {allSegs.map((seg, i) => {
          const l = ((seg.start - first) / total) * 100;
          const w = ((seg.end - seg.start) / total) * 100;
          return (
            <div key={i} className="c-strip-seg"
                 style={{ left: `${l}%`, width: `${w}%`, background: H.appColor(seg.app) }}
                 title={`${seg.app} · ${seg.title || ""}`} />
          );
        })}
        {sessions.map(s => {
          const sStart = new Date(s.startedAt).getTime();
          const l = ((sStart - first) / total) * 100;
          return (
            <div key={s.id} className="c-strip-divider" style={{ left: `${l}%` }}>
              <div className="c-strip-divider-label">{s.name}</div>
            </div>
          );
        })}
      </div>
      <div className="c-strip-axis">
        {ticks.map(t => (
          <span key={t} style={{ left: `${((t-first)/total)*100}%` }}>
            {new Date(t).toLocaleTimeString(undefined, { hour: "numeric" })}
          </span>
        ))}
        <span className="c-strip-now" style={{ left: "100%" }}>now</span>
      </div>
    </div>
  );
}

function ActiveMini({ session, nowMs }) {
  const sStart = new Date(session.startedAt).getTime();
  const sEnd = nowMs;
  const segs = H.toSegments(session.events);
  const total = sEnd - sStart;
  return (
    <div className="c-active-mini">
      {segs.map((seg, i) => {
        const l = ((seg.start - sStart) / total) * 100;
        const w = ((seg.end - seg.start) / total) * 100;
        return (
          <div key={i} className="c-active-mini-seg"
               style={{ left: `${l}%`, width: `${w}%`, background: H.appColor(seg.app) }}
               title={seg.app} />
        );
      })}
    </div>
  );
}

function SceneCard({ session, nowMs, index }) {
  const dur = H.sessionDurationSec(session, nowMs);
  const end = session.endedAt ? new Date(session.endedAt).getTime() : nowMs;
  const slices = H.groupByApp(session.events, new Date(session.startedAt).getTime(), end);
  const topApp = slices[0];
  const score = H.focusScore(session, nowMs) || 0;
  const switches = H.contextSwitches(session.events);
  const longest = H.longestStretch(session.events);
  const isActive = !session.endedAt;

  const mood = score >= 0.75 ? "deep" : score >= 0.5 ? "mixed" : "scattered";

  return (
    <li className={`c-scene ${isActive ? "c-scene-active" : ""}`}>
      <div className="c-scene-rail" style={{ background: topApp ? H.appColor(topApp.app) : "#444" }} />
      <div className="c-scene-time">
        <div className="c-scene-start">{H.formatClock(session.startedAt)}</div>
        <div className="c-scene-dur">{H.formatDurationShort(dur)}</div>
        {session.endedAt && <div className="c-scene-end">{H.formatClock(session.endedAt)}</div>}
      </div>
      <div className="c-scene-body">
        <div className="c-scene-head">
          <div>
            <div className="c-scene-idx">Scene {String(index+1).padStart(2,"0")}</div>
            <h3 className="c-scene-title">{session.name}</h3>
          </div>
          <div className={`c-scene-mood c-scene-mood-${mood}`}>
            <div className="c-scene-mood-num">{Math.round(score*100)}</div>
            <div className="c-scene-mood-label">{mood}</div>
          </div>
        </div>

        <div className="c-scene-strip">
          {H.toSegments(session.events).map((seg, i) => {
            const sStart = new Date(session.startedAt).getTime();
            const total = end - sStart;
            const l = ((seg.start - sStart) / total) * 100;
            const w = ((seg.end - seg.start) / total) * 100;
            return (
              <div key={i} className="c-scene-strip-seg"
                   style={{ left: `${l}%`, width: `${w}%`, background: H.appColor(seg.app) }}
                   title={`${seg.app} · ${seg.title || ""} · ${H.formatDurationShort((seg.end-seg.start)/1000)}`} />
            );
          })}
        </div>

        <div className="c-scene-foot">
          <div className="c-scene-apps">
            {slices.slice(0,3).map(s => (
              <span key={s.app} className="c-scene-app">
                <span className="a-apps-swatch" style={{ background: H.appColor(s.app) }} />
                {s.app}
                <span className="c-muted">{s.percent.toFixed(0)}%</span>
              </span>
            ))}
            {slices.length > 3 && <span className="c-muted">+{slices.length-3} more</span>}
          </div>
          <div className="c-scene-notes">
            {longest && <span>Longest stretch: <strong>{H.formatDurationShort(longest.seconds)}</strong> in {longest.app}</span>}
            <span className="c-dot">·</span>
            <span>{switches} switches</span>
          </div>
        </div>
      </div>
    </li>
  );
}

window.DirectionC = DirectionC;

</script>

<script type="text/babel">
/* global React, H */
// ========== Direction D — Ribbon overview + editor-style drawer ==========
const { useState: useStateD, useEffect: useEffectD, useMemo: useMemoD } = React;

function DirectionD() {
  const [tab, setTab] = useStateD(() => {
    try { return localStorage.getItem("bt:d-tab") || "Today"; } catch { return "Today"; }
  });
  useEffectD(() => { try { localStorage.setItem("bt:d-tab", tab); } catch {} }, [tab]);

  if (tab === "Aggregate") {
    return <div className="d-root"><TopNavD tab={tab} setTab={setTab} /><AggregateView /></div>;
  }
  if (tab === "Web") {
    return <div className="d-root"><TopNavD tab={tab} setTab={setTab} /><WebView /></div>;
  }
  if (tab === "Week") {
    return <div className="d-root"><TopNavD tab={tab} setTab={setTab} /><WeekView /></div>;
  }
  return <DirectionDToday tab={tab} setTab={setTab} />;
}

function DirectionDToday({ tab, setTab }) {
  const sessions = window.__APP__.SESSIONS;
  const active = sessions.find(s => !s.endedAt);
  const nowMs = window.__APP__.NOW.getTime();
  const elapsedSec = useDemoElapsed(active.startedAt);

  const [selectedId, setSelectedId] = useStateD(null);
  const [cmdOpen, setCmdOpen] = useStateD(false);
  const [catFilter, setCatFilter] = useStateD("all");

  // Keyboard: ⌘K toggles command bar, Esc closes drawer/cmd, j/k navigate
  useEffectD(() => {
    function onKey(e) {
      const tag = (e.target && e.target.tagName) || "";
      const inInput = /^(INPUT|TEXTAREA)$/.test(tag);
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
        e.preventDefault(); setCmdOpen(v => !v);
      } else if (e.key === "Escape") {
        if (cmdOpen) setCmdOpen(false);
        else if (selectedId) setSelectedId(null);
      } else if (!inInput && (e.key === "j" || e.key === "k")) {
        const order = sortedSessions().map(s => s.id);
        if (order.length === 0) return;
        const i = order.indexOf(selectedId);
        const next = e.key === "j"
          ? (i < 0 ? 0 : Math.min(order.length - 1, i + 1))
          : (i < 0 ? order.length - 1 : Math.max(0, i - 1));
        setSelectedId(order[next]);
      }
    }
    function sortedSessions() {
      return [...sessions].sort((a,b)=>new Date(a.startedAt)-new Date(b.startedAt));
    }
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [selectedId, cmdOpen]);

  const totalSec = sessions.reduce((a, s) => a + H.sessionDurationSec(s, nowMs), 0);
  const focus = H.dayFocusScore(sessions, nowMs);
  const switches = sessions.reduce((a, s) => a + H.contextSwitches(s.events), 0);

  // Category totals for the filter chips
  const catTotals = useMemoD(() => {
    const map = new Map();
    for (const s of sessions) {
      for (const e of s.events) {
        const cat = H.appCategory(e.data.app);
        map.set(cat, (map.get(cat) || 0) + e.duration);
      }
    }
    return map;
  }, [sessions]);

  const filteredSessions = catFilter === "all"
    ? sessions
    : sessions.filter(s => s.events.some(e => H.appCategory(e.data.app) === catFilter));

  const selected = sessions.find(s => s.id === selectedId);
  const drawerOpen = !!selected;

  return (
    <div className="d-root">
      <TopNavD tab={tab} setTab={setTab} />
      {cmdOpen && (
        <CommandBarD
          onClose={() => setCmdOpen(false)}
          sessions={sessions}
          onPick={id => { setSelectedId(id); setCmdOpen(false); }}
        />
      )}

      <div className={`d-canvas ${drawerOpen ? "d-dimmed" : ""}`}>
        <header className="c-head">
          <div className="c-head-left">
            <div className="c-kicker">Saturday · April 18, 2026</div>
            <h1 className="c-h1">Your day, so far.</h1>
          </div>
          <div className="c-head-stats">
            <Stat c-label="tracked" value={H.formatDurationShort(totalSec)} />
            <Stat c-label="focus"   value={`${Math.round(focus*100)}`} suffix="/100" />
            <Stat c-label="switches" value={String(switches)} />
          </div>
        </header>

        <div className="d-toolbar">
          <button className="d-cmd-trigger" onClick={() => setCmdOpen(true)}>
            <span className="d-cmd-icon">⌕</span>
            <span>Search tasks, apps · jump anywhere</span>
            <kbd className="b-kbd" style={{marginLeft: "auto"}}>⌘K</kbd>
          </button>
          <div className="d-toolbar-sep" />
          <div className="d-toolbar-filter">
            <button className={catFilter==="all"?"active":""} onClick={() => setCatFilter("all")}>All</button>
            {["code","creative","comm","meeting","browse"].map(c => {
              const total = catTotals.get(c) || 0;
              if (total === 0) return null;
              return (
                <button key={c} className={catFilter===c?"active":""} onClick={() => setCatFilter(c)}>
                  <span className="d-fdot" style={{background: H.CATEGORY_COLOR[c]}} />
                  <span style={{textTransform: "capitalize"}}>{c}</span>
                </button>
              );
            })}
          </div>
        </div>

        <FilmStrip sessions={sessions} nowMs={nowMs} />

        <div className="c-active-card" style={{marginTop: 32}}>
          <div className="c-active-grid">
            <div className="c-active-kicker">
              <span className="c-active-pulse"></span>
              IN PROGRESS
            </div>
            <div className="c-active-timer">{H.formatDuration(elapsedSec)}</div>
            <div className="c-active-title">{active.name}</div>
            <div className="c-active-meta">
              Currently in{" "}
              <strong style={{ color: H.appColor(H.currentEvent(active).data.app) }}>
                {H.currentEvent(active).data.app}
              </strong>{" "}
              · {H.currentEvent(active).data.title}{" "}
              · started {H.formatClock(active.startedAt)}
            </div>
            <div className="c-active-actions">
              <button className="c-btn c-btn-ghost" onClick={e => { e.stopPropagation(); }}>Pause</button>
              <button className="c-btn c-btn-stop" onClick={e => { e.stopPropagation(); }}>Stop</button>
              <button className="c-btn c-btn-switch" onClick={() => setSelectedId(active.id)}>Inspect this task →</button>
            </div>
          </div>
          <ActiveMini session={active} nowMs={nowMs} />
        </div>

        <div className="c-ribbon-header" style={{marginTop: 40}}>
          <h2>Today, scene by scene</h2>
          <p>Click any scene for the full breakdown. <kbd className="b-kbd">j</kbd>/<kbd className="b-kbd">k</kbd> to navigate · <kbd className="b-kbd">⌘K</kbd> to jump.</p>
        </div>

        <ol className="c-ribbon">
          {[...filteredSessions].sort((a,b)=>new Date(a.startedAt)-new Date(b.startedAt)).map((s, i) => (
            <SceneCardD
              key={s.id} session={s} nowMs={nowMs} index={i}
              selected={selectedId === s.id}
              onClick={() => setSelectedId(s.id)}
            />
          ))}
        </ol>

        <div className="c-footer">
          <div>Local · ActivityWatch connected · nothing leaves this machine.</div>
        </div>
      </div>

      <div className={`d-drawer-scrim ${drawerOpen?"open":""}`} onClick={() => setSelectedId(null)} />
      <aside className={`d-drawer ${drawerOpen?"open":""}`} aria-hidden={!drawerOpen}>
        {selected && <SceneDrawer session={selected} nowMs={nowMs} onClose={() => setSelectedId(null)} />}
      </aside>

      {!drawerOpen && !cmdOpen && (
        <div className="d-keyhint">
          <kbd className="b-kbd">⌘K</kbd> search · click a scene for detail
        </div>
      )}
    </div>
  );
}

function SceneCardD({ session, nowMs, index, selected, onClick }) {
  const dur = H.sessionDurationSec(session, nowMs);
  const end = session.endedAt ? new Date(session.endedAt).getTime() : nowMs;
  const slices = H.groupByApp(session.events, new Date(session.startedAt).getTime(), end);
  const topApp = slices[0];
  const score = H.focusScore(session, nowMs) || 0;
  const switches = H.contextSwitches(session.events);
  const longest = H.longestStretch(session.events);
  const isActive = !session.endedAt;
  const mood = score >= 0.75 ? "deep" : score >= 0.5 ? "mixed" : "scattered";

  return (
    <li
      className={`c-scene d-scene ${isActive ? "c-scene-active" : ""} ${selected ? "d-scene-selected" : ""}`}
      onClick={onClick}
    >
      <div className="c-scene-rail" style={{ background: topApp ? H.appColor(topApp.app) : "#444" }} />
      <div className="c-scene-time">
        <div className="c-scene-start">{H.formatClock(session.startedAt)}</div>
        <div className="c-scene-dur">{H.formatDurationShort(dur)}</div>
        {session.endedAt && <div className="c-scene-end">{H.formatClock(session.endedAt)}</div>}
      </div>
      <div className="c-scene-body">
        <div className="c-scene-head">
          <div>
            <div className="c-scene-idx">Scene {String(index+1).padStart(2,"0")}</div>
            <h3 className="c-scene-title">
              {session.name}
              <span className="d-scene-chevron">›</span>
            </h3>
          </div>
          <div className={`c-scene-mood c-scene-mood-${mood}`}>
            <div className="c-scene-mood-num">{Math.round(score*100)}</div>
            <div className="c-scene-mood-label">{mood}</div>
          </div>
        </div>

        <div className="c-scene-strip">
          {H.toSegments(session.events).map((seg, i) => {
            const sStart = new Date(session.startedAt).getTime();
            const total = end - sStart;
            const l = ((seg.start - sStart) / total) * 100;
            const w = ((seg.end - seg.start) / total) * 100;
            return (
              <div key={i} className="c-scene-strip-seg"
                   style={{ left: `${l}%`, width: `${w}%`, background: H.appColor(seg.app) }}
                   title={`${seg.app} · ${seg.title || ""}`} />
            );
          })}
        </div>

        <div className="c-scene-foot">
          <div className="c-scene-apps">
            {slices.slice(0,3).map(s => (
              <span key={s.app} className="c-scene-app">
                <span className="a-apps-swatch" style={{ background: H.appColor(s.app) }} />
                {s.app}
                <span className="c-muted">{s.percent.toFixed(0)}%</span>
              </span>
            ))}
            {slices.length > 3 && <span className="c-muted">+{slices.length-3} more</span>}
          </div>
          <div className="c-scene-notes">
            {longest && <span>Longest stretch: <strong>{H.formatDurationShort(longest.seconds)}</strong> in {longest.app}</span>}
            <span className="c-dot">·</span>
            <span>{switches} switches</span>
          </div>
        </div>
      </div>
    </li>
  );
}

function SceneDrawer({ session, nowMs, onClose }) {
  const isActive = !session.endedAt;
  const sStart = new Date(session.startedAt).getTime();
  const sEnd = session.endedAt ? new Date(session.endedAt).getTime() : nowMs;
  const dur = H.sessionDurationSec(session, nowMs);
  const switches = H.contextSwitches(session.events);
  const score = H.focusScore(session, nowMs) || 0;
  const longest = H.longestStretch(session.events);
  const slices = H.groupByApp(session.events, sStart, sEnd);
  const moodClass = score >= 0.75 ? "d-drawer-focus-good" : score >= 0.5 ? "d-drawer-focus-mixed" : "d-drawer-focus-bad";

  return (
    <>
      <div className="d-drawer-head">
        <div style={{minWidth: 0}}>
          <div className={`d-drawer-kicker ${isActive ? "is-active" : ""}`}>
            {isActive && <span className="d-drawer-kicker-pulse" />}
            {isActive ? "In progress" : "Completed task"}
          </div>
          <h2 className="d-drawer-title">{session.name}</h2>
          <div className="d-drawer-meta">
            {H.formatClock(session.startedAt)} – {session.endedAt ? H.formatClock(session.endedAt) : "now"}
            {" · "}{H.formatDurationShort(dur)}
          </div>
        </div>
        <div className="d-drawer-focus">
          <div className={`d-drawer-focus-num ${moodClass}`}>{Math.round(score*100)}</div>
          <div className="d-drawer-focus-label">focus</div>
        </div>
        <button className="d-drawer-close" onClick={onClose} aria-label="Close drawer">×</button>
      </div>

      <div className="d-drawer-body">
        <div className="d-stat-row">
          <div className="d-stat-mini">
            <div className="d-stat-mini-k">Switches</div>
            <div className="d-stat-mini-v">{switches}</div>
            <div className="d-stat-mini-sub">{switches === 0 ? "one stretch" : `${H.toSegments(session.events).length} segments`}</div>
          </div>
          <div className="d-stat-mini">
            <div className="d-stat-mini-k">Longest</div>
            <div className="d-stat-mini-v">{longest ? H.formatDurationShort(longest.seconds) : "—"}</div>
            <div className="d-stat-mini-sub" style={{color: longest ? H.appColor(longest.app) : undefined}}>{longest ? longest.app : ""}</div>
          </div>
          <div className="d-stat-mini">
            <div className="d-stat-mini-k">Top app</div>
            <div className="d-stat-mini-v" style={{color: slices[0] ? H.appColor(slices[0].app) : undefined}}>
              {slices[0] ? `${slices[0].percent.toFixed(0)}%` : "—"}
            </div>
            <div className="d-stat-mini-sub">{slices[0]?.app || ""}</div>
          </div>
        </div>

        <div>
          <div className="d-section">
            <span>Attention trace</span>
            <span className="d-section-hint">{H.formatClock(session.startedAt)} – {session.endedAt ? H.formatClock(session.endedAt) : "now"}</span>
          </div>
          <DrawerMicroTimeline session={session} nowMs={nowMs} />
        </div>

        <div>
          <div className="d-section"><span>App breakdown</span><span className="d-section-hint">{slices.length} apps</span></div>
          <ul className="d-break">
            {slices.map(s => (
              <li key={s.app} className="d-break-row">
                <span className="a-apps-swatch" style={{ background: H.appColor(s.app) }} />
                <span className="d-break-name">{s.app}</span>
                <div className="d-break-bar"><div className="d-break-fill" style={{ width: `${s.percent}%`, background: H.appColor(s.app) }} /></div>
                <span className="d-break-pct">{s.percent.toFixed(0)}%</span>
                <span className="d-break-dur">{H.formatDurationShort(s.seconds)}</span>
              </li>
            ))}
          </ul>
        </div>

        <div>
          <div className="d-section"><span>Event log</span><span className="d-section-hint">{session.events.length} events</span></div>
          <ul className="d-events">
            {[...session.events].map((e, i) => {
              const isLast = i === session.events.length - 1;
              return (
                <li key={e.id} className={`d-event ${isActive && isLast ? "d-event-live" : ""}`}>
                  <span className="d-event-time">{H.formatClock(e.timestamp)}</span>
                  <span className="a-apps-swatch" style={{ background: H.appColor(e.data.app) }} />
                  <span className="d-event-app">{e.data.app}</span>
                  <span className="d-event-title">{e.data.title}</span>
                  <span className="d-event-dur">{H.formatDurationShort(e.duration)}</span>
                </li>
              );
            })}
          </ul>
        </div>
      </div>

      <div className="d-drawer-foot">
        <button className="d-drawer-btn">Rename</button>
        <button className="d-drawer-btn">Split</button>
        {isActive ? (
          <>
            <button className="d-drawer-btn d-drawer-btn-stop" style={{marginLeft: "auto"}}>Stop task</button>
          </>
        ) : (
          <button className="d-drawer-btn d-drawer-btn-primary">Resume</button>
        )}
      </div>
    </>
  );
}

function DrawerMicroTimeline({ session, nowMs }) {
  const sStart = new Date(session.startedAt).getTime();
  const sEnd = session.endedAt ? new Date(session.endedAt).getTime() : nowMs;
  const segs = H.toSegments(session.events);
  const total = sEnd - sStart;
  return (
    <>
      <div className="d-micro">
        {segs.map((seg, i) => {
          const l = ((seg.start - sStart) / total) * 100;
          const w = ((seg.end - seg.start) / total) * 100;
          return (
            <div key={i} className="d-micro-seg" title={`${seg.app} · ${seg.title || ""} · ${H.formatDurationShort((seg.end-seg.start)/1000)}`}
                 style={{ left: `${l}%`, width: `${w}%`, background: H.appColor(seg.app) }} />
          );
        })}
      </div>
      <div className="d-micro-axis">
        <span>{H.formatClock(session.startedAt)}</span>
        <span>{session.endedAt ? H.formatClock(session.endedAt) : "now"}</span>
      </div>
    </>
  );
}

function CommandBarD({ onClose, sessions, onPick }) {
  const [q, setQ] = useStateD("");
  const items = useMemoD(() => {
    const taskItems = sessions.map(s => ({
      kind: s.endedAt ? "Task" : "Active",
      label: s.name,
      hint: H.formatClock(s.startedAt),
      action: () => onPick(s.id),
    }));
    return [
      { kind: "View",  label: "Open Today",     hint: "",     action: onClose },
      { kind: "View",  label: "Open Week",      hint: "",     action: onClose },
      { kind: "View",  label: "Open Aggregate", hint: "",     action: onClose },
      { kind: "Data",  label: "Export CSV",     hint: "today",action: onClose },
      ...taskItems,
    ];
  }, [sessions]);

  const filtered = items.filter(i => i.label.toLowerCase().includes(q.toLowerCase()));
  const [sel, setSel] = useStateD(0);
  useEffectD(() => { setSel(0); }, [q]);

  function onKeyDown(e) {
    if (e.key === "ArrowDown") { e.preventDefault(); setSel(s => Math.min(filtered.length - 1, s + 1)); }
    else if (e.key === "ArrowUp") { e.preventDefault(); setSel(s => Math.max(0, s - 1)); }
    else if (e.key === "Enter")   { const it = filtered[sel]; if (it) it.action(); }
  }

  return (
    <div className="d-cmd-wrap" onClick={onClose}>
      <div className="d-cmd" onClick={e => e.stopPropagation()}>
        <input autoFocus placeholder="Type a command or task name…"
               value={q} onChange={e => setQ(e.target.value)} onKeyDown={onKeyDown}
               className="d-cmd-input" />
        <ul className="d-cmd-list">
          {filtered.map((i, idx) => (
            <li key={idx} className={`d-cmd-item ${idx===sel?"d-cmd-sel":""}`}
                onMouseEnter={() => setSel(idx)}
                onClick={() => i.action()}>
              <span className="d-cmd-kind">{i.kind}</span>
              <span className="d-cmd-label">{i.label}</span>
              {i.hint && <span className="d-cmd-hint">{i.hint}</span>}
            </li>
          ))}
          {filtered.length === 0 && (
            <li className="d-cmd-item" style={{color: "var(--muted)"}}>No matches</li>
          )}
        </ul>
        <div className="d-cmd-foot">
          <span><kbd className="b-kbd">↑↓</kbd> navigate</span>
          <span><kbd className="b-kbd">⏎</kbd> select</span>
          <span><kbd className="b-kbd">esc</kbd> close</span>
        </div>
      </div>
    </div>
  );
}

window.DirectionD = DirectionD;

</script>

<style>
/* ==================== AGGREGATE VIEW ==================== */
.agg-root {
  max-width: 1280px;
  margin: 0 auto;
  padding: 24px 28px 80px;
  font-family: var(--sans);
}
.agg-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

<script type="text/babel">
const { useState: useStateAgg, useMemo: useMemoAgg } = React;

// -------- Time helpers --------
function dayKey(d) { // YYYY-MM-DD
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function startOfWeek(d) {
  // Week starts Monday
  const x = new Date(d); x.setHours(0,0,0,0);
  const day = x.getDay(); // 0=Sun .. 6=Sat
  const diff = day === 0 ? -6 : 1 - day;
  x.setDate(x.getDate() + diff);
  return x;
}
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate()+n); return x; }
function dayLabels(start) {
  const names = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  return names.map((n, i) => {
    const d = addDays(start, i);
    return { name: n, date: d, key: dayKey(d), shortDate: `${d.getMonth()+1}/${d.getDate()}` };
  });
}

function sessionsInRange(sessions, fromMs, toMs) {
  return sessions.filter(s => {
    const t = new Date(s.startedAt).getTime();
    return t >= fromMs && t < toMs;
  });
}
function visitsInRange(visits, fromMs, toMs) {
  return visits.filter(v => {
    const t = new Date(v.timestamp).getTime();
    return t >= fromMs && t < toMs;
  });
}

function fmtDelta(cur, prev, formatter = (n)=>String(Math.round(n))) {
  if (prev === 0 && cur === 0) return { label: "—", cls: "agg-delta-flat", arrow: "·" };
  if (prev === 0) return { label: "new", cls: "agg-delta-up", arrow: "▲" };
  const diff = cur - prev;
  const pct = Math.round((diff / prev) * 100);
  if (pct === 0) return { label: "0%", cls: "agg-delta-flat", arrow: "·" };
  const arrow = diff > 0 ? "▲" : "▼";
  const cls = diff > 0 ? "agg-delta-up" : "agg-delta-down";
  return { label: `${Math.abs(pct)}%`, cls, arrow };

  const curVisits    = visitsInRange(ALL_VISITS, curStart.getTime(), curEnd.getTime());
  const prevVisits   = visitsInRange(ALL_VISITS, prevStart.getTime(), prevEnd.getTime());

  const curTotal = sumSeconds(curSessions);

  const curFocus = avgFocus(curSessions);
  const prevFocus = avgFocus(prevSessions);

  // Top task (by time)

    const m = new Map();
    for (const s of ss) {
      const sec = H.sessionDurationSec(s, nowMs);
      m.set(s.name, (m.get(s.name) || 0) + sec);
    }
    return [...m.entries()].sort((a,b)=>b[1]-a[1]);
  };
  const curTaskTime = taskTime(curSessions);
  const prevTaskTime = taskTime(prevSessions);
  const topTask = curTaskTime[0] || ["—", 0];

  // Top app
  const appTime = (ss) => {
    const m = new Map();
    for (const s of ss) for (const e of s.events) {
      m.set(e.data.app, (m.get(e.data.app) || 0) + e.duration);
    }
    return [...m.entries()].sort((a,b)=>b[1]-a[1]);
  };
  const curAppTime = appTime(curSessions);
  const prevAppTime = appTime(prevSessions);
  const topApp = curAppTime[0] || ["—", 0];

  // Daily totals (this + prev)
  const dailyCur = days.map(d => {
    const from = d.date.getTime();
    const to = addDays(d.date, 1).getTime();
    const ss = sessionsInRange(curSessions, from, to);
    return { ...d, total: sumSeconds(ss) };
  });
  const dailyPrev = days.map((d, i) => {
    const pd = addDays(prevStart, i);
    const from = pd.getTime();
    const to = addDays(pd, 1).getTime();
    const ss = sessionsInRange(prevSessions, from, to);
    return { total: sumSeconds(ss) };
  });
  const maxDaily = Math.max(
    ...dailyCur.map(d => d.total),
    ...dailyPrev.map(d => d.total),
    1,
  );

  // Recurring tasks (appearing on 2+ days in current period)
  const recurring = useMemoAgg(() => {
    const byName = new Map();
    for (const s of curSessions) {
      const key = s.name;
      const sec = H.sessionDurationSec(s, nowMs);
      const day = dayKey(new Date(s.startedAt));
      if (!byName.has(key)) byName.set(key, { name: key, runs: [], days: new Set() });
      const entry = byName.get(key);
      entry.runs.push(sec);
      entry.days.add(day);
    }
    const rows = [...byName.values()]
      .filter(r => r.runs.length >= 2)
      .map(r => {
        const total = r.runs.reduce((a,b)=>a+b,0);
        const avg = total / r.runs.length;
        const best = Math.min(...r.runs);
        const worst = Math.max(...r.runs);
        // Previous-period comparison
        const prev = prevSessions.filter(s => s.name === r.name).map(s => H.sessionDurationSec(s, nowMs));
        const prevTotal = prev.reduce((a,b)=>a+b,0);
        const prevAvg = prev.length ? prevTotal / prev.length : 0;
        return { ...r, total, avg, best, worst, runCount: r.runs.length, daysCount: r.days.size, prevAvg, prevTotal };
      })
      .sort((a,b) => b.total - a.total);
    return rows;
  }, [curSessions, prevSessions]);

  // Pivot (task × day)
  const pivot = useMemoAgg(() => {
    const taskNames = [...new Set(curSessions.map(s => s.name))];
    // Sort by total time desc
    taskNames.sort((a,b) => {
      const ta = curSessions.filter(s => s.name === a).reduce((x,s) => x + H.sessionDurationSec(s, nowMs), 0);
      const tb = curSessions.filter(s => s.name === b).reduce((x,s) => x + H.sessionDurationSec(s, nowMs), 0);
      return tb - ta;
    });
    const rows = taskNames.map(name => {
      const cells = days.map(d => {
        const from = d.date.getTime(), to = addDays(d.date, 1).getTime();
        const ss = curSessions.filter(s => {
          const t = new Date(s.startedAt).getTime();
          return s.name === name && t >= from && t < to;
        });
        return sumSeconds(ss);
      });
      const total = cells.reduce((a,b)=>a+b,0);
      return { name, cells, total };
    });
    const dayTotals = days.map((_, i) => rows.reduce((a,r) => a + r.cells[i], 0));
    const grandTotal = dayTotals.reduce((a,b)=>a+b,0);
    return { rows, dayTotals, grandTotal };
  }, [curSessions]);

  // Max cell for heatmap
  const maxCell = Math.max(1, ...pivot.rows.flatMap(r => r.cells));

  // Web aggregation
  const webCats = useMemoAgg(() => {
    const m = new Map();
    for (const v of curVisits) {
      const cat = (DOMAIN_META[v.domain]?.cat) || "Other";
      m.set(cat, (m.get(cat) || 0) + v.duration);
    }
    const arr = [...m.entries()].map(([cat, sec]) => ({ cat, sec }));
    const total = arr.reduce((a,b)=>a+b.sec,0);
    arr.forEach(a => a.pct = total > 0 ? (a.sec / total) * 100 : 0);
    arr.sort((a,b)=>b.sec-a.sec);
    return { rows: arr, total };
  }, [curVisits]);

  const webDomains = useMemoAgg(() => {
    const m = new Map();
    for (const v of curVisits) m.set(v.domain, (m.get(v.domain) || 0) + v.duration);
    return [...m.entries()].map(([domain, sec]) => ({ domain, sec })).sort((a,b)=>b.sec-a.sec).slice(0, 8);
  }, [curVisits]);

  // Top-app deltas
  const topAppsWithDelta = curAppTime.slice(0, 5).map(([app, sec]) => {
    const prev = prevAppTime.find(([a]) => a === app);
    const prevSec = prev ? prev[1] : 0;
    return { app, sec, prevSec, delta: fmtDelta(sec, prevSec) };
  });
  const maxAppSec = Math.max(1, ...topAppsWithDelta.map(a => a.sec));

  function exportCsv() {
    const header = ["Task", ...days.map(d => `${d.name} ${d.shortDate}`), "Total"];
    const rows = [header];
    for (const r of pivot.rows) {
      rows.push([r.name, ...r.cells.map(c => Math.round(c/60)), Math.round(r.total/60)]);
    }
    rows.push(["TOTAL", ...pivot.dayTotals.map(t => Math.round(t/60)), Math.round(pivot.grandTotal/60)]);
    const csv = rows.map(r => r.map(c => {
      const s = String(c);
      return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
    }).join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `buildtime-${range}-week.csv`; a.click();
    URL.revokeObjectURL(url);
  }

  const rangeLabel = `${curStart.toLocaleDateString(undefined, {month:'short', day:'numeric'})} – ${addDays(curEnd, -1).toLocaleDateString(undefined, {month:'short', day:'numeric'})}`;

  return (
    <div className="agg-root">
      <div className="agg-head">
        <div>
          <div className="agg-kicker">Aggregate · {rangeLabel}</div>
          <h1 className="agg-h1">{range === "this" ? "This week in review" : "Last week, in review"}</h1>
          <div className="agg-sub">{curSessions.length} tasks · {H.formatDurationShort(curTotal)} tracked · {curVisits.length} page visits</div>
        </div>
        <div className="agg-controls">
          <div className="agg-seg">
            <button className={range==="this" ? "active" : ""} onClick={() => setRange("this")}>This week</button>
            <button className={range==="last" ? "active" : ""} onClick={() => setRange("last")}>Last week</button>
          </div>
          <button className={`agg-compare ${compare?"on":""}`} onClick={() => setCompare(c => !c)}>
            <span className="agg-compare-dot" />
            Compare vs prior
          </button>
          <button className="agg-export-btn" onClick={exportCsv}>⤓ Export CSV</button>
        </div>
      </div>

      {/* KPIs */}
      <div className="agg-kpis">
        <KpiCard label="Total tracked" value={H.formatDurationShort(curTotal)}
                 sub={`${curSessions.length} tasks`}
                 delta={compare ? fmtDelta(curTotal, prevTotal) : null}
                 deltaSub={compare ? `vs ${H.formatDurationShort(prevTotal)} prior` : null} />
        <KpiCard label="Avg focus" value={`${Math.round(curFocus*100)}`} suffix="/100"
                 sub={curFocus >= 0.7 ? "Deep week" : curFocus >= 0.5 ? "Mixed" : "Choppy"}
                 delta={compare ? fmtDelta(curFocus, prevFocus) : null}
                 deltaSub={compare ? `vs ${Math.round(prevFocus*100)} prior` : null} />
        <KpiCard label="Top task" value={topTask[0]}
                 sub={H.formatDurationShort(topTask[1])}
                 isText />
        <KpiCard label="Top app" value={topApp[0]}
                 sub={H.formatDurationShort(topApp[1])}
                 isText
                 valueColor={H.appColor(topApp[0])} />
      </div>

      {/* Daily bars + Top apps */}
      <div className="agg-grid-2">
        <section className="agg-panel">
          <div className="agg-panel-head">
            <h3>Daily totals</h3>
            <div className="agg-panel-legend">
              <span><span className="agg-legend-sw" style={{background:"var(--accent)"}} />This week</span>
              {compare && <span><span className="agg-legend-sw" style={{background:"var(--line-2)"}} />Prior</span>}
            </div>
          </div>
          <div className="agg-bars">
            {dailyCur.map((d, i) => {
              const curH = (d.total / maxDaily) * 100;
              const prevH = (dailyPrev[i].total / maxDaily) * 100;
              const isToday = dayKey(d.date) === dayKey(NOW);
              return (
                <div key={d.key} className="agg-bar-col">
                  <div className="agg-bar-stack">
                    {compare && dailyPrev[i].total > 0 && (
                      <div className="agg-bar agg-bar-prev" style={{height:`${Math.max(1,prevH)}%`}}>
                        <div className="agg-bar-tip">{H.formatDurationShort(dailyPrev[i].total)}</div>
                      </div>
                    )}
                    {d.total > 0 && (
                      <div className="agg-bar agg-bar-cur" style={{height:`${Math.max(1,curH)}%`}}>
                        <div className="agg-bar-tip">{H.formatDurationShort(d.total)}{isToday?" · today":""}</div>
                      </div>
                    )}
                  </div>
                  <div className="agg-bar-label">
                    {isToday ? <b>Today</b> : d.name}
                    <div style={{fontSize:10, color:'var(--muted-2)'}}>{d.shortDate}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </section>

        <section className="agg-panel">
          <div className="agg-panel-head">
            <h3>Top apps</h3>
            <div className="agg-panel-sub">{curAppTime.length} total</div>
          </div>
          <div className="agg-top-apps">
            {topAppsWithDelta.map(a => (
              <div key={a.app}>
                <div className="agg-top-row">
                  <span className="a-apps-swatch" style={{background: H.appColor(a.app)}} />
                  <span className="agg-top-row-name">{a.app}</span>
                  <span className="agg-top-row-val">{H.formatDurationShort(a.sec)}</span>
                </div>
                <div className="agg-top-row-bar">
                  <div style={{width: `${(a.sec/maxAppSec)*100}%`, background: H.appColor(a.app)}} />
                </div>
                {compare && (
                  <div style={{marginTop: 3, fontSize: 11, color: "var(--muted)", marginLeft: 24}}>
                    <span className={`agg-delta ${a.delta.cls}`}>
                      <span className="agg-delta-arrow">{a.delta.arrow}</span>{a.delta.label}
                    </span>
                    <span style={{marginLeft: 6}}>vs {H.formatDurationShort(a.prevSec)} last week</span>
                  </div>
                )}
              </div>
            ))}
          </div>
        </section>
      </div>

      {/* Recurring tasks */}
      <div className="agg-section-head">
        <div>
          <h2>Recurring tasks</h2>
          <p>Same-name tasks appearing on 2+ days this week. Are you getting faster at anything?</p>
        </div>
      </div>
      <div className="agg-panel" style={{padding: 0}}>
        <table className="agg-rt-table">
          <thead>
            <tr>
              <th style={{paddingLeft: 16}}>Task</th>
              <th className="num">Runs</th>
              <th className="num">Total</th>
              <th className="num">Avg</th>
              <th className="num">Best</th>
              <th className="num">Worst</th>
              <th className="num">Trend</th>
              {compare && <th className="num" style={{paddingRight: 16}}>vs last wk</th>}
            </tr>
          </thead>
          <tbody>
            {recurring.length === 0 && (
              <tr><td colSpan={compare?8:7} style={{textAlign:'center', padding: 24, color:'var(--muted)'}}>No recurring tasks yet this week.</td></tr>
            )}
            {recurring.map(r => {
              const maxRun = Math.max(...r.runs);
              const d = fmtDelta(r.avg, r.prevAvg);
              return (
                <tr key={r.name}>
                  <td className="task" style={{paddingLeft: 16}}>
                    <span className="agg-rt-name">{r.name}</span>
                    <div style={{fontSize: 11, color: 'var(--muted)'}}>{r.daysCount} days · {r.runCount} runs</div>
                  </td>
                  <td className="num">{r.runCount}</td>
                  <td className="num">{H.formatDurationShort(r.total)}</td>
                  <td className="num">{H.formatDurationShort(r.avg)}</td>
                  <td className="num" style={{color:'var(--good)'}}>{H.formatDurationShort(r.best)}</td>
                  <td className="num" style={{color:'var(--warn)'}}>{H.formatDurationShort(r.worst)}</td>
                  <td className="num">
                    <span className="agg-rt-trend">
                      {r.runs.map((v, i) => (
                        <span key={i} className="agg-rt-trend-bar"
                              style={{height: `${Math.max(2, (v/maxRun)*14)}px`, background: 'var(--accent-2)'}} />
                      ))}
                    </span>
                  </td>
                  {compare && (
                    <td className="num" style={{paddingRight: 16}}>
                      <span className={`agg-delta ${d.cls}`}>
                        <span className="agg-delta-arrow">{d.arrow}</span>{d.label}
                      </span>
                    </td>
                  )}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* Pivot table */}
      <div className="agg-section-head">
        <div>
          <h2>Time by task × day</h2>
          <p>Minutes per task, heatmap-colored. Hover to inspect.</p>
        </div>
        <button className="agg-export-btn" onClick={exportCsv}>⤓ Export CSV</button>
      </div>
      <div className="agg-pivot-wrap">
        <table className="agg-pivot">
          <thead>
            <tr>
              <th className="task">Task</th>
              {days.map(d => {
                const isToday = dayKey(d.date) === dayKey(NOW);
                return <th key={d.key} style={isToday ? {color:'var(--accent)'} : null}>{d.name}<div style={{fontSize:10, color:'var(--muted-2)'}}>{d.shortDate}</div></th>;
              })}
              <th>Total</th>
            </tr>
          </thead>
          <tbody>
            {pivot.rows.map(r => (
              <tr key={r.name}>
                <td className="task">{r.name}</td>
                {r.cells.map((c, i) => {
                  if (c === 0) return <td key={i} className="agg-cell-empty">·</td>;
                  const intensity = Math.min(1, c / maxCell);
                  const bg = `color-mix(in oklab, var(--accent) ${Math.round(intensity*70)}%, transparent)`;
                  return (
                    <td key={i} style={{background: bg, color: intensity > 0.5 ? 'var(--text)' : 'var(--text-2)'}}
                        title={`${r.name} · ${days[i].name}: ${H.formatDurationShort(c)}`}>
                      {Math.round(c/60)}m
                    </td>
                  );
                })}
                <td style={{fontWeight: 600, color: 'var(--text)'}}>{H.formatDurationShort(r.total)}</td>
              </tr>
            ))}
          </tbody>
          <tfoot>
            <tr>
              <td className="task">Daily total</td>
              {pivot.dayTotals.map((t, i) => (
                <td key={i}>{t > 0 ? H.formatDurationShort(t) : "·"}</td>
              ))}
              <td>{H.formatDurationShort(pivot.grandTotal)}</td>
            </tr>
          </tfoot>
        </table>
      </div>

      {/* Browsing */}
      <div className="agg-section-head">
        <div>
          <h2>Browsing</h2>
          <p>Where web time went this week, from the same ActivityWatch stream.</p>
        </div>
        <div className="agg-panel-sub">{H.formatDurationShort(webCats.total)} · {curVisits.length} visits</div>
      </div>
      <div className="agg-web-grid">
        <section className="agg-panel">
          <div className="agg-panel-head">
            <h3>By category</h3>
          </div>
          <div className="agg-web-cats">
            {webCats.rows.map(r => (
              <div key={r.cat}>
                <div className="agg-web-cat-row">
                  <span className="agg-web-cat-dot" style={{background: CAT_COLOR[r.cat] || CAT_COLOR.Other}} />
                  <span className="agg-web-cat-name">{r.cat}</span>
                  <span className="agg-web-cat-val">{H.formatDurationShort(r.sec)}</span>
                  <span className="agg-web-cat-pct">{r.pct.toFixed(0)}%</span>
                </div>
                <div className="agg-top-row-bar" style={{marginLeft: 22}}>
                  <div style={{width: `${r.pct}%`, background: CAT_COLOR[r.cat] || CAT_COLOR.Other}} />
                </div>
              </div>
            ))}
            {webCats.rows.length === 0 && <div style={{color:'var(--muted)', padding: 12}}>No browsing recorded.</div>}
          </div>
        </section>

        <section className="agg-panel">
          <div className="agg-panel-head">
            <h3>Top domains</h3>
          </div>
          <div className="agg-top-apps">
            {webDomains.map(d => {
              const cat = (DOMAIN_META[d.domain]?.cat) || "Other";
              const color = CAT_COLOR[cat] || CAT_COLOR.Other;
              const max = webDomains[0].sec;
              return (
                <div key={d.domain}>
                  <div className="agg-top-row">
                    <span className="agg-web-cat-dot" style={{background: color}} />
                    <span className="agg-top-row-name">{d.domain}</span>
                    <span className="agg-top-row-val">{H.formatDurationShort(d.sec)}</span>
                  </div>
                  <div className="agg-top-row-bar" style={{marginLeft: 22}}>
                    <div style={{width: `${(d.sec/max)*100}%`, background: color}} />
                  </div>
                </div>
              );
            })}
          </div>
        </section>
      </div>
    </div>
  );
}

function KpiCard({ label, value, suffix, sub, delta, deltaSub, isText, valueColor }) {
  return (
    <div className="agg-kpi">
      <div className="agg-kpi-label">{label}</div>
      <div className="agg-kpi-value" style={{
        ...(valueColor ? {color: valueColor} : null),
        ...(isText ? {fontSize: 20, fontFamily: 'var(--sans)', letterSpacing: 0, overflow:'hidden', textOverflow:'ellipsis'} : null),
      }}>
        {value}
        {suffix && <span style={{fontFamily:'var(--sans)', fontSize: 14, color: 'var(--muted)', marginLeft: 4}}>{suffix}</span>}
      </div>
      {sub && <div className="agg-kpi-sub">{sub}</div>}
      {delta && (
        <div style={{marginTop: 4}}>
          <span className={`agg-delta ${delta.cls}`}>
            <span className="agg-delta-arrow">{delta.arrow}</span>{delta.label}
          </span>
          {deltaSub && <span style={{fontSize: 11, color: 'var(--muted)', marginLeft: 6}}>{deltaSub}</span>}
        </div>
      )}
    </div>
  );
}

// ==================== WEEK VIEW ====================
function WeekView() {
  const { ALL_SESSIONS, NOW } = window.__APP__;
  const nowMs = NOW.getTime();

  const curStart = startOfWeek(new Date(NOW));
  const days = dayLabels(curStart).filter(d => d.date.getTime() <= nowMs);

  const daySessions = days.map(d => {
    const from = d.date.getTime();
    const to = Math.min(addDays(d.date, 1).getTime(), nowMs + 1000);
    return { ...d, sessions: sessionsInRange(ALL_SESSIONS, from, to) };
  });

  const dayFocusList = daySessions.map(d => {
    const scores = d.sessions.map(s => H.focusScore(s, nowMs)).filter(x => x != null);
    return scores.length ? scores.reduce((a,b)=>a+b,0)/scores.length : null;
  });

  const dayTotal = daySessions.map(d =>
    d.sessions.reduce((a, s) => a + H.sessionDurationSec(s, nowMs), 0)
  );

  const today = dayKey(NOW);
  const [hoveredTask, setHoveredTask] = useStateAgg(null);

  const HOUR_START = 8, HOUR_END = 20;
  const DAY_RANGE_MS = (HOUR_END - HOUR_START) * 3600 * 1000;

  const totalTracked = dayTotal.reduce((a,b)=>a+b,0);
  const totalTasks = daySessions.flatMap(d=>d.sessions).filter(s=>s.endedAt).length;
  const validFocus = dayFocusList.filter(x => x != null);
  const avgFocus = validFocus.length ? Math.round(validFocus.reduce((a,b)=>a+b,0)/validFocus.length*100) : null;

  return (
    <div className="wk-root">
      <div className="wk-head">
        <div>
          <div className="wk-kicker">Week of {curStart.toLocaleDateString(undefined,{month:'long',day:'numeric'})}</div>
          <h1 className="wk-h1">This week</h1>
        </div>
        <div className="wk-summary">
          <div className="wk-sum-item">
            <div className="wk-sum-label">Total tracked</div>
            <div className="wk-sum-val">{H.formatDurationShort(totalTracked)}</div>
          </div>
          <div className="wk-sum-item">
            <div className="wk-sum-label">Tasks completed</div>
            <div className="wk-sum-val">{totalTasks}</div>
          </div>
          <div className="wk-sum-item">
            <div className="wk-sum-label">Avg focus</div>
            <div className="wk-sum-val">
              {avgFocus != null ? avgFocus : "—"}
              {avgFocus != null && <span className="wk-sum-suffix">/100</span>}
            </div>
          </div>
        </div>
      </div>

      <div className="wk-layout">
        <div className="wk-left">
          <div className="wk-section-label">Daily timeline · 8 am – 8 pm</div>

          <div className="wk-ticks-row">
            <div className="wk-day-label-spacer" />
            <div className="wk-ticks">
              {[8,10,12,14,16,18,20].map(h => (
                <div key={h} className="wk-tick"
                     style={{left:`${((h-HOUR_START)/(HOUR_END-HOUR_START))*100}%`}}>
                  {h===12?"noon":h>12?`${h-12}p`:`${h}a`}
                </div>
              ))}
            </div>
          </div>

          {daySessions.map((d, di) => {
            const isToday = d.key === today;
            const focus = dayFocusList[di];
            const focusCls = focus==null?"" : focus>=0.7?"wk-focus-good":focus>=0.5?"wk-focus-mid":"wk-focus-bad";
            const dayFromMs = d.date.getTime() + HOUR_START * 3600 * 1000;

            const segs = d.sessions.flatMap(s =>
              H.toSegments(s.events).map(seg => ({ ...seg, sessionName: s.name, sessionId: s.id }))
            );

            return (
              <div key={d.key} className={`wk-row ${isToday?"wk-row-today":""}`}>
                <div className="wk-day-label">
                  <div className={`wk-day-name ${isToday?"wk-day-name-today":""}`}>{isToday?"Today":d.name}</div>
                  <div className="wk-day-date">{d.shortDate}</div>
                </div>
                <div className="wk-track">
                  {d.sessions.length===0 && <div className="wk-track-empty">No sessions</div>}
                  {segs.map((seg, si) => {
                    const l = Math.max(0, ((seg.start - dayFromMs)/DAY_RANGE_MS)*100);
                    const w = Math.min(100-l, ((seg.end - seg.start)/DAY_RANGE_MS)*100);
                    if (w<=0||l>=100) return null;
                    return (
                      <div key={si}
                        className={`wk-seg ${hoveredTask===seg.sessionId?"wk-seg-hi":""}`}
                        style={{left:`${l}%`,width:`${Math.max(0.4,w)}%`,background:H.appColor(seg.app)}}
                        title={`${seg.sessionName} · ${seg.app}`}
                        onMouseEnter={()=>setHoveredTask(seg.sessionId)}
                        onMouseLeave={()=>setHoveredTask(null)}
                      />
                    );
                  })}
                </div>
                <div className="wk-day-meta">
                  {focus!=null
                    ? <span className={`wk-focus-badge ${focusCls}`}>{Math.round(focus*100)}</span>
                    : <span className="wk-focus-badge wk-focus-empty">—</span>}
                  <span className="wk-day-total">{dayTotal[di]>0?H.formatDurationShort(dayTotal[di]):""}</span>
                </div>
              </div>
            );
          })}

          <div style={{marginTop: 28}}>
            <div className="wk-section-label">Focus trend</div>
            <WkSparkline values={dayFocusList} labels={days.map(d=>d.name)} today={today} days={days} />
          </div>
        </div>

        <div className="wk-right">
          <div className="wk-section-label">What you shipped</div>
          <div className="wk-shipped">
            {[...daySessions].reverse().map(d => {
              const completed = d.sessions.filter(s => s.endedAt);
              if (completed.length===0) return null;
              const isToday = d.key === today;
              return (
                <div key={d.key} className="wk-shipped-day">
                  <div className="wk-shipped-day-head">
                    <span className={`wk-shipped-day-name ${isToday?"wk-day-name-today":""}`}>
                      {isToday ? "Today" : `${d.name}, ${d.shortDate}`}
                    </span>
                    <span className="wk-shipped-day-count">{completed.length} tasks</span>
                  </div>
                  {completed.map(s => {
                    const dur = H.sessionDurationSec(s, nowMs);
                    const sEnd = new Date(s.endedAt).getTime();
                    const topApp = H.groupByApp(s.events, new Date(s.startedAt).getTime(), sEnd)[0];
                    return (
                      <div key={s.id}
                           className={`wk-task-row ${hoveredTask===s.id?"wk-task-row-hi":""}`}
                           onMouseEnter={()=>setHoveredTask(s.id)}
                           onMouseLeave={()=>setHoveredTask(null)}>
                        <div className="wk-task-check">✓</div>
                        <div className="wk-task-body">
                          <div className="wk-task-name">{s.name}</div>
                          <div className="wk-task-meta">
                            <span className="wk-task-dur">{H.formatDurationShort(dur)}</span>
                            {topApp && <>
                              <span className="wk-task-dot">·</span>
                              <span className="wk-task-app" style={{color:H.appColor(topApp.app)}}>{topApp.app}</span>
                            </>}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

function WkSparkline({ values, labels, today, days }) {
  const W = 500, SH = 60, PAD = 10;
  const n = values.length;
  const pts = values.map((v, i) => {
    const x = PAD + (i / Math.max(n-1,1)) * (W - PAD*2);
    const y = v != null ? SH - PAD - (v * (SH - PAD*2)) : null;
    return { x, y, v, key: days[i]?.key };
  }).filter(p => p.y != null);

  if (pts.length === 0) return null;
  const pathD = pts.map((p,i) => `${i===0?"M":"L"} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(" ");

  return (
    <div className="wk-sparkline">
      <svg viewBox={`0 0 ${W} ${SH}`} preserveAspectRatio="none" style={{width:"100%",height:60}}>
        <line x1={PAD} y1={SH-PAD-0.7*(SH-PAD*2)} x2={W-PAD} y2={SH-PAD-0.7*(SH-PAD*2)}
              stroke="var(--line)" strokeWidth="1" strokeDasharray="3 3" />
        <path d={pathD} fill="none" stroke="var(--accent)" strokeWidth="2"
              strokeLinecap="round" strokeLinejoin="round" />
        {pts.map((p,i) => {
          const col = p.v>=0.7?"var(--good)":p.v>=0.5?"var(--warn)":"var(--bad)";
          return <circle key={i} cx={p.x} cy={p.y} r="4" fill={col} stroke="var(--bg-1)" strokeWidth="1.5" />;
        })}
      </svg>
      <div className="wk-sparkline-labels">
        {values.map((v,i) => (
          <span key={i} style={{flex:1,textAlign:'center',color:days[i]?.key===today?"var(--accent)":"var(--muted)"}}>
            {days[i]?.key===today?"Today":days[i]?.name}
          </span>
        ))}
      </div>
    </div>
  );
}

window.WeekView = WeekView;
</script>

<script type="text/babel">
  const { useState: useStateRoot, useEffect: useEffectRoot } = React;

  function Root() {
    // Report mode: standalone printable page
    if (new URLSearchParams(window.location.search).get("report") === "1") {
      return <WebReport />;
    }

    const [direction, setDirection] = useStateRoot(() => {
      try {
        const saved = JSON.parse(localStorage.getItem("bt:tweaks") || "{}");
        return saved.direction || "A";
      } catch { return "A"; }
    });

    useEffectRoot(() => {
      function onChange(e) { setDirection(e.detail.direction); }
      window.addEventListener("tweaks:change", onChange);
      return () => window.removeEventListener("tweaks:change", onChange);
    }, []);

    if (direction === "A") return <DirectionA />;
    if (direction === "B") return <DirectionB />;
    if (direction === "D") return <DirectionD />;
    return <DirectionC />;
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
