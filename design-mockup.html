<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BuildTimeTracker — Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet">
<style>
/* =================================================================
   BuildTimeTracker — Redesign explorations
   Shared tokens + three directions (A: refined, B: editor, C: ribbon)
   ================================================================= */

:root {
  --bg: #0c0d10;
  --bg-1: #111318;
  --bg-2: #171a20;
  --bg-3: #1d2128;
  --line: #23272f;
  --line-2: #2d323c;
  --text: #e6e8ee;
  --text-2: #b6bcc8;
  --muted: #7a818d;
  --muted-2: #555b66;
  --accent: #8cd7ff;
  --accent-2: #6fb3d6;
  --good: #6ee7a7;
  --warn: #fbbf24;
  --bad:  #f87171;
  --radius: 10px;
  --radius-lg: 14px;
  --mono: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
  --sans: "Inter", ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
  --serif: "Fraunces", "Iowan Old Style", "Palatino", Georgia, serif;
}

/* density */
.dense { --pad: 10px; --pad-lg: 14px; --row: 30px; --fs-base: 13px; }
.cozy  { --pad: 14px; --pad-lg: 18px; --row: 38px; --fs-base: 14px; }

html, body, #root {
  background: var(--bg);
  color: var(--text);
  height: 100%;
  margin: 0;
  font-family: var(--sans);
  font-size: var(--fs-base, 14px);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

* { box-sizing: border-box; }
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
input, select { font: inherit; color: inherit; }
kbd {
  font-family: var(--mono);
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 4px;
  background: #22262e;
  border: 1px solid var(--line-2);
  color: var(--text-2);
}

.a-muted, .b-muted, .c-muted { color: var(--muted); }
.a-dot, .b-dot, .c-dot { color: var(--muted-2); margin: 0 6px; }
.a-apps-swatch { width: 8px; height: 8px; border-radius: 2px; display: inline-block; flex-shrink:0; }

/* ===================== TWEAKS PANEL ===================== */
.tweaks {
  position: fixed;
  right: 16px;
  bottom: 16px;
  width: 280px;
  background: var(--bg-2);
  border: 1px solid var(--line-2);
  border-radius: var(--radius-lg);
  padding: 14px;
  z-index: 100;
  font-size: 12px;
  box-shadow: 0 18px 48px rgba(0,0,0,.5);
  display: none;
}
.tweaks.open { display: block; }
.tweaks h3 {
  margin: 0 0 10px;
  font-size: 11px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
}
.tweaks-group { margin-bottom: 12px; }
.tweaks-label { display:block; margin-bottom: 6px; color: var(--text-2); font-size:11px; letter-spacing:.04em; text-transform: uppercase;}
.tweaks-seg {
  display: flex;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 2px;
  gap: 2px;
}
.tweaks-seg button {
  flex: 1;
  padding: 6px 4px;
  border-radius: 6px;
  color: var(--muted);
  font-size: 11px;
  min-width: 0;
}
.tweaks-seg button.active { background: var(--bg-3); color: var(--text); }
.tweaks-close {
  position: absolute; right: 10px; top: 8px; color: var(--muted); padding: 4px 8px; border-radius: 6px;
}
.tweaks-close:hover { color: var(--text); background: var(--bg-3); }

/* ===================== DIRECTION A — refined dashboard ===================== */
.a-root { max-width: 1240px; margin: 0 auto; padding: 28px 32px 80px; }

.a-topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding-bottom: 20px;
  margin-bottom: 22px;
  border-bottom: 1px solid var(--line);
}
.a-brand { display:flex; align-items:center; gap: 10px; font-weight: 600; letter-spacing: -.01em; font-size: 15px; }
.a-brand-mark {
  width: 22px; height: 22px; border-radius: 6px;
  background: linear-gradient(135deg, var(--accent) 0%, #c084fc 100%);
  position: relative;
}
.a-brand-mark::after {
  content: ""; position: absolute; inset: 4px; border-radius: 3px;
  background: var(--bg-1); mask: radial-gradient(closest-side, transparent 56%, #000 58%);
  -webkit-mask: radial-gradient(closest-side, transparent 56%, #000 58%);
}
.a-tabs { display: flex; gap: 2px; padding: 3px; background: var(--bg-1); border: 1px solid var(--line); border-radius: 999px; }
.a-tab {
  padding: 6px 14px; border-radius: 999px; color: var(--muted); font-size: 13px; font-weight: 500;
}
.a-tab:hover { color: var(--text-2); }
.a-tab-active { background: var(--bg-3); color: var(--text); box-shadow: inset 0 0 0 1px var(--line-2); }
.a-topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.a-connected {
  display: inline-flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted);
  padding: 6px 10px; border: 1px solid var(--line); border-radius: 999px;
}
.a-connected-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--good); box-shadow: 0 0 0 3px rgba(110,231,167,.12); }
.a-icon-btn {
  width: 32px; height: 32px; border-radius: 8px; color: var(--muted);
  border: 1px solid var(--line); display:inline-flex; align-items:center; justify-content:center;
}
.a-icon-btn:hover { color: var(--text); border-color: var(--line-2); background: var(--bg-1); }

.a-hero {
  display: grid; grid-template-columns: 1fr auto; gap: 32px; align-items: center;
  padding: 26px 28px;
  background:
    radial-gradient(600px 200px at 10% 0%, rgba(140,215,255,.08), transparent 60%),
    linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 100%);
  border: 1px solid var(--line-2);
  border-radius: var(--radius-lg);
  margin-bottom: 10px;
  position: relative;
  overflow: hidden;
}
.a-hero::before {
  content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: linear-gradient(180deg, var(--accent), transparent);
  animation: a-pulse 2s ease-in-out infinite;
}
@keyframes a-pulse { 0%,100% { opacity:.5 } 50% { opacity:1 } }
.a-hero-label {
  font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 8px; display:flex; align-items:center; gap:6px;
}
.a-hero-label::before { content:""; width:6px; height:6px; border-radius:50%; background: var(--accent); box-shadow: 0 0 0 3px rgba(140,215,255,.15);}
.a-hero-title { font-size: 30px; font-weight: 600; letter-spacing: -.02em; margin-bottom: 6px; }
.a-hero-meta { color: var(--muted); font-size: 13px; }
.a-hero-meta strong { color: var(--text-2); font-weight: 600; }
.a-hero-right { text-align: right; }
.a-hero-timer {
  font-family: var(--mono); font-size: 48px; font-weight: 500;
  letter-spacing: -.02em; line-height: 1; color: var(--text);
  font-variant-numeric: tabular-nums;
}
.a-hero-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
.a-btn { padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; transition: all .15s; }
.a-btn-ghost { color: var(--text-2); border: 1px solid var(--line-2); }
.a-btn-ghost:hover { border-color: var(--text-2); color: var(--text); }
.a-btn-stop { background: var(--bad); color: #2a0808; }
.a-btn-stop:hover { background: #fc8c8c; }

.a-quickstart {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-top: 0;
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
  margin-top: -12px;
  margin-bottom: 22px;
  position: relative;
  z-index: 1;
}
.a-quickstart-icon { color: var(--muted); font-size: 18px; }
.a-quickstart-input {
  flex: 1; background: transparent; border: 0; outline: 0; color: var(--text);
  font-size: 14px;
}
.a-quickstart-input::placeholder { color: var(--muted); }
.a-quickstart-recent { display:flex; gap: 6px; flex-wrap: nowrap; overflow-x:hidden;}
.a-chip {
  padding: 4px 10px; border-radius: 999px; font-size: 12px;
  background: var(--bg-2); color: var(--text-2); border: 1px solid var(--line);
  white-space: nowrap;
}
.a-chip:hover { border-color: var(--accent-2); color: var(--accent); }
.a-kbd { font-family: var(--mono); font-size: 11px; padding: 2px 6px; border-radius: 4px; background: var(--bg-3); color: var(--muted); }

.a-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 22px; }
.a-stat {
  padding: 14px 16px;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  position: relative;
  overflow: hidden;
}
.a-stat-label { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.a-stat-value { font-size: 26px; font-weight: 600; letter-spacing: -.02em; display:flex; align-items:baseline; gap: 4px; }
.a-stat-suffix { font-size: 14px; color: var(--muted); font-weight: 500; }
.a-stat-hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
.a-stat-good .a-stat-value { color: var(--good); }
.a-stat-ok   .a-stat-value { color: var(--warn); }
.a-stat-bad  .a-stat-value { color: var(--bad); }

.a-grid { display: grid; grid-template-columns: 1.7fr 1fr; gap: 16px; margin-bottom: 16px; }
.a-panel {
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  margin-bottom: 16px;
}
.a-panel-head { display:flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; }
.a-panel-head h2 { margin: 0; font-size: 14px; font-weight: 600; letter-spacing: -.005em; }
.a-panel-sub { font-size: 12px; color: var(--muted); }

/* Timeline */
.a-tl { position: relative; padding-top: 6px; }
.a-tl-axis { position: relative; height: 16px; margin-bottom: 10px; }
.a-tl-tick { position: absolute; top: 0; transform: translateX(-50%); font-size: 10px; color: var(--muted); }
.a-tl-rows { display: flex; flex-direction: column; gap: 6px; }
.a-tl-row {
  display: grid; grid-template-columns: 130px 1fr 56px; align-items: center; gap: 10px;
  height: 28px;
}
.a-tl-label {
  font-size: 12px; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  text-align: right;
}
.a-tl-track { position: relative; height: 28px; background: var(--bg-2); border-radius: 6px; overflow: hidden; }
.a-tl-gridline { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(255,255,255,.03); }
.a-tl-bar { position: absolute; top: 4px; bottom: 4px; background: rgba(255,255,255,.02); border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,.04); }
.a-tl-bar.is-active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.a-tl-ev { position: absolute; top: 0; bottom: 0; opacity: .88; }
.a-tl-dur { font-family: var(--mono); font-size: 11px; color: var(--muted); text-align: right; }

/* Apps panel */
.a-apps { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
.a-apps-row { display: grid; grid-template-columns: 110px 1fr 60px; align-items: center; gap: 10px; font-size: 13px; }
.a-apps-name { display:flex; align-items:center; gap: 8px; color: var(--text-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.a-apps-bar { height: 6px; background: var(--bg-2); border-radius: 3px; overflow: hidden; }
.a-apps-fill { height: 100%; border-radius: 3px; }
.a-apps-dur { font-family: var(--mono); font-size: 11px; color: var(--text-2); text-align: right; }

/* Task list */
.a-tasklist { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
.a-task {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 14px 16px;
  background: var(--bg-2);
}
.a-task-head {
  display: grid; grid-template-columns: 1.3fr 1fr 120px 60px;
  align-items: center; gap: 12px; margin-bottom: 10px;
}
.a-task-name { font-weight: 500; font-size: 14px; }
.a-task-meta { font-size: 12px; color: var(--muted); }
.a-task-focus { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
.a-focus-bar { flex: 1; height: 4px; background: var(--bg-3); border-radius: 2px; overflow: hidden; }
.a-focus-fill { height: 100%; background: linear-gradient(90deg, var(--warn), var(--good)); }
.a-task-dur { font-family: var(--mono); font-size: 13px; text-align: right; }
.a-task-stack { display: flex; height: 8px; border-radius: 4px; overflow: hidden; background: var(--bg-3); margin-bottom: 10px; }
.a-task-stack-slice { transition: flex-grow .2s; }
.a-task-apps { display: flex; flex-wrap: wrap; gap: 12px; font-size: 12px; color: var(--text-2); }
.a-task-app { display: inline-flex; align-items: center; gap: 6px; }
.a-task-app .a-muted { margin-left: 4px; }

/* ===================== WEB / COMPLIANCE tab (lives inside Direction A) ===================== */
.a-web-head {
  display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: end;
  margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--line);
}
.a-web-kicker { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.a-web-title { font-size: 26px; font-weight: 600; letter-spacing: -.02em; margin: 0 0 4px; }
.a-web-sub { color: var(--muted); font-size: 13px; }

.a-web-controls {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  margin-bottom: 18px;
}
.a-range {
  display: inline-flex; align-items: center; gap: 0;
  background: var(--bg-1); border: 1px solid var(--line); border-radius: 10px;
  padding: 3px;
}
.a-range button {
  padding: 6px 12px; border-radius: 7px; font-size: 12px; color: var(--muted); font-weight: 500;
  white-space: nowrap;
}
.a-range button:hover { color: var(--text-2); }
.a-range button.active { background: var(--bg-3); color: var(--text); box-shadow: inset 0 0 0 1px var(--line-2); }
.a-range-sep { width: 1px; height: 18px; background: var(--line); margin: 0 2px; align-self: center; }
.a-export-btn, .a-group-toggle button { white-space: nowrap; }
.a-daterange {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 10px;
  background: var(--bg-1); border: 1px solid var(--line); border-radius: 8px;
  font-size: 12px; color: var(--text-2);
  position: relative;
}
.a-daterange-icon { color: var(--muted); }
.a-daterange input {
  background: transparent; border: 0; outline: 0;
  color: var(--text); font-family: var(--mono); font-size: 12px;
  width: 90px; padding: 0; color-scheme: dark;
}
.a-daterange input::-webkit-calendar-picker-indicator { filter: invert(.7); cursor: pointer; }
.a-daterange-arrow { color: var(--muted-2); font-family: var(--mono); }

.a-group-toggle {
  display: inline-flex; gap: 0;
  background: var(--bg-1); border: 1px solid var(--line); border-radius: 10px; padding: 3px;
  margin-left: auto;
}
.a-group-toggle button {
  padding: 6px 12px; border-radius: 7px; font-size: 12px; color: var(--muted); font-weight: 500;
  display: inline-flex; align-items: center; gap: 6px;
}
.a-group-toggle button:hover { color: var(--text-2); }
.a-group-toggle button.active { background: var(--bg-3); color: var(--text); box-shadow: inset 0 0 0 1px var(--line-2); }
.a-group-toggle svg { width: 12px; height: 12px; }

.a-export-btn {
  padding: 7px 12px; border-radius: 8px; font-size: 12px; font-weight: 500;
  color: var(--text-2); border: 1px solid var(--line-2); background: var(--bg-1);
  display: inline-flex; align-items: center; gap: 8px;
}
.a-export-btn:hover { color: var(--text); border-color: var(--muted-2); }

.a-web-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 22px; }

/* Domain grouping */
.a-domain-list {
  background: var(--bg-1); border: 1px solid var(--line); border-radius: var(--radius-lg);
  overflow: hidden;
}
.a-domain-head, .a-domain-row {
  display: grid;
  grid-template-columns: 32px 1.6fr 90px 90px 1fr 90px;
  gap: 14px; align-items: center;
  padding: 10px 16px;
}
.a-domain-head {
  font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted);
  border-bottom: 1px solid var(--line);
  background: var(--bg-2);
}
.a-domain-head > div:nth-child(4),
.a-domain-head > div:nth-child(6),
.a-domain-row  > div:nth-child(4),
.a-domain-row  > div:nth-child(6) { text-align: right; font-variant-numeric: tabular-nums; }
.a-domain-row {
  border-bottom: 1px solid var(--line);
  font-size: 13px;
  transition: background .12s;
}
.a-domain-row:last-child { border-bottom: 0; }
.a-domain-row:hover { background: var(--bg-2); }
.a-fav {
  width: 26px; height: 26px; border-radius: 6px;
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  color: #0b0c10;
  letter-spacing: -.02em;
}
.a-domain-name { display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
.a-domain-dom { font-weight: 500; color: var(--text); font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.a-domain-urls { color: var(--muted); font-size: 11px; }
.a-cat-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 2px 8px; border-radius: 999px;
  font-size: 11px; background: var(--bg-2); border: 1px solid var(--line-2); color: var(--text-2);
  width: fit-content;
}
.a-cat-dot { width: 6px; height: 6px; border-radius: 50%; }
.a-domain-visits { color: var(--muted); font-family: var(--mono); font-size: 12px; }
.a-domain-bar { height: 6px; background: var(--bg-2); border-radius: 3px; overflow: hidden; }
.a-domain-fill { height: 100%; border-radius: 3px; }
.a-domain-dur { font-family: var(--mono); color: var(--text); font-size: 13px; }

.a-domain-expand {
  grid-column: 1 / -1;
  padding: 4px 16px 14px 62px;
  background: var(--bg-2);
  border-top: 1px solid var(--line);
  display: flex; flex-direction: column; gap: 4px;
}
.a-domain-url-row {
  display: grid; grid-template-columns: 1fr 60px 60px;
  gap: 12px; padding: 4px 0; font-size: 12px; align-items: baseline;
}
.a-domain-url-title { color: var(--text-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.a-domain-url-visits, .a-domain-url-dur { text-align: right; font-family: var(--mono); font-size: 11px; color: var(--muted); }

/* Category treemap */
.a-cat-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  grid-auto-rows: 100px;
  gap: 10px;
  margin-bottom: 22px;
}
.a-cat-cell {
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  border: 1px solid transparent;
  display: flex; flex-direction: column; justify-content: space-between;
  overflow: hidden; position: relative; min-width: 0;
  transition: transform .2s;
}
.a-cat-cell:hover { transform: translateY(-2px); }
.a-cat-cell-name { font-size: 12px; font-weight: 500; color: var(--text); letter-spacing: .02em; }
.a-cat-cell-dur { font-family: var(--mono); font-size: 20px; color: var(--text); font-weight: 500; letter-spacing: -.01em; }
.a-cat-cell-meta { font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; }
.a-cat-domains {
  list-style: none; padding: 0; margin: 0;
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px 16px;
}
.a-cat-domains li {
  display: grid; grid-template-columns: 1fr auto;
  font-size: 12px; padding: 6px 0; border-top: 1px solid var(--line); color: var(--text-2);
  align-items: baseline;
}
.a-cat-domains li > span:last-child { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.a-cat-panel {
  background: var(--bg-1); border: 1px solid var(--line); border-radius: var(--radius-lg);
  padding: 16px 18px;
}
.a-cat-panel-head {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
}
.a-cat-panel-title { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; }

/* Timeline of visits */
.a-webtl {
  background: var(--bg-1); border: 1px solid var(--line); border-radius: var(--radius-lg);
  padding: 16px 20px;
}
.a-webtl-day {
  display: grid;
  grid-template-columns: 100px 1fr;
  gap: 16px;
  padding: 14px 0;
  border-bottom: 1px solid var(--line);
}
.a-webtl-day:last-child { border-bottom: 0; }
.a-webtl-date { font-family: var(--mono); font-size: 11px; color: var(--muted); padding-top: 4px; }
.a-webtl-date-big { font-size: 14px; font-weight: 600; color: var(--text); font-family: var(--sans); margin-bottom: 2px; }
.a-webtl-total { font-family: var(--mono); font-size: 11px; color: var(--text-2); margin-top: 6px; }
.a-webtl-body {}
.a-webtl-strip {
  height: 28px; border-radius: 4px; overflow: hidden; background: var(--bg-2);
  display: flex; margin-bottom: 10px; border: 1px solid var(--line);
}
.a-webtl-strip-seg { height: 100%; min-width: 1px; transition: opacity .1s; }
.a-webtl-strip-seg:hover { opacity: .7; }
.a-webtl-visits { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 2px; }
.a-webtl-visit {
  display: grid; grid-template-columns: 56px 22px 160px 1fr 50px;
  gap: 10px; align-items: center; font-size: 12px;
  padding: 3px 6px; border-radius: 4px;
}
.a-webtl-visit:hover { background: var(--bg-2); }
.a-webtl-time { font-family: var(--mono); color: var(--muted); font-size: 11px; }
.a-webtl-fav {
  width: 18px; height: 18px; border-radius: 4px;
  font-family: var(--mono); font-size: 9px; font-weight: 600;
  display: inline-flex; align-items: center; justify-content: center; color: #0b0c10;
}
.a-webtl-dom { color: var(--text-2); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.a-webtl-title { color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.a-webtl-dur { text-align: right; font-family: var(--mono); color: var(--text-2); font-size: 11px; }

/* Full report (print-ready) */
.a-report {
  max-width: 900px; margin: 0 auto; padding: 48px 40px; background: var(--bg);
}
.a-report h1 { font-size: 28px; font-weight: 600; letter-spacing: -.02em; margin: 0 0 6px; }
.a-report-sub { color: var(--muted); margin-bottom: 28px; font-size: 13px; }
.a-report-meta {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
  padding: 16px; background: var(--bg-1); border: 1px solid var(--line); border-radius: 10px;
  margin-bottom: 28px;
}
.a-report-meta div div:first-child {
  font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px;
}
.a-report-meta div div:last-child { font-family: var(--mono); font-size: 14px; font-weight: 500; }
.a-report-section { margin-bottom: 32px; }
.a-report-section h2 {
  font-size: 13px; font-weight: 600; letter-spacing: .02em;
  margin: 0 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--line);
}
.a-report-print {
  position: fixed; top: 24px; right: 24px;
  padding: 8px 14px; border-radius: 8px; font-size: 13px;
  background: var(--accent); color: #0b0c10; font-weight: 500;
}
.a-report-print:hover { background: var(--accent-2); }
.a-report-back {
  position: fixed; top: 24px; left: 24px;
  padding: 8px 14px; border-radius: 8px; font-size: 13px;
  color: var(--muted); border: 1px solid var(--line); background: var(--bg-1);
  text-decoration: none;
}
.a-report-back:hover { color: var(--text); border-color: var(--line-2); }

@media print {
  .a-report-print, .a-report-back { display: none; }
  body { background: white; color: black; }
  .a-report { padding: 20px; max-width: none; }
  .a-domain-list, .a-report-meta, .a-cat-cell, .a-webtl {
    background: white !important; border-color: #ddd !important; break-inside: avoid;
  }
  .a-domain-row:hover, .a-webtl-visit:hover { background: transparent !important; }
  * { color: black !important; }
  .a-fav, .a-webtl-fav, .a-cat-dot, .a-domain-fill, .a-webtl-strip-seg { color: white !important; }
}

/* ===================== DIRECTION B — editor-inspired ===================== */
.b-root {
  display: grid;
  grid-template-columns: 240px 1fr;
  height: 100vh;
  background: var(--bg);
  font-size: 13px;
}
.b-side {
  background: #0a0b0e;
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
  padding: 16px 10px;
}
.b-side-brand {
  display: flex; align-items: center; gap: 10px; padding: 4px 8px 16px;
  font-weight: 600; font-size: 14px; letter-spacing: -.01em;
}
.b-brand-mark {
  width: 18px; height: 18px; border-radius: 4px;
  background: linear-gradient(135deg, #6ee7a7, #8cd7ff);
}
.b-nav { display: flex; flex-direction: column; gap: 2px; flex: 1; overflow: hidden; }
.b-nav-section {
  font-size: 10px; text-transform: uppercase; letter-spacing: .14em;
  color: var(--muted-2); padding: 14px 10px 6px;
}
.b-nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 10px; border-radius: 6px; font-size: 13px;
  color: var(--text-2); text-align: left;
}
.b-nav-item:hover { background: var(--bg-1); color: var(--text); }
.b-nav-active { background: var(--bg-2); color: var(--text); }
.b-nav-ico { width: 16px; color: var(--muted); font-size: 14px; text-align: center; }
.b-nav-dot { width: 7px; height: 7px; border-radius: 50%; }
.b-nav-count { margin-left: auto; font-size: 11px; color: var(--muted); font-family: var(--mono); }

.b-side-foot { padding: 12px 10px 0; border-top: 1px solid var(--line); }
.b-conn { display: flex; align-items: center; gap: 10px; }
.b-conn-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--good); box-shadow: 0 0 8px var(--good); animation: a-pulse 2s ease-in-out infinite; }
.b-conn-label { font-size: 12px; color: var(--text-2); font-family: var(--mono); }
.b-conn-sub { font-size: 10px; color: var(--muted); }

.b-main { display: flex; flex-direction: column; overflow: hidden; }
.b-toolbar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 18px;
  border-bottom: 1px solid var(--line);
  background: var(--bg);
}
.b-crumb { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; }
.b-crumb-sep { color: var(--muted-2); }
.b-crumb-date { color: var(--muted); font-weight: 400; }
.b-toolbar-spacer { flex: 1; }
.b-cmd-trigger {
  display: inline-flex; align-items: center; gap: 14px;
  padding: 6px 8px 6px 12px; border-radius: 8px;
  background: var(--bg-1); border: 1px solid var(--line);
  color: var(--muted); font-size: 12px; min-width: 320px;
}
.b-cmd-trigger:hover { border-color: var(--line-2); }
.b-kbd { font-family: var(--mono); font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--bg-3); color: var(--muted); }
.b-toolbar-actions { display: flex; gap: 4px; }
.b-icon-btn {
  width: 30px; height: 30px; border-radius: 6px; color: var(--muted);
  display:inline-flex; align-items:center; justify-content:center;
}
.b-icon-btn:hover { background: var(--bg-1); color: var(--text); }

.b-active-bar {
  display: grid; grid-template-columns: auto 1fr auto auto auto;
  align-items: center; gap: 16px;
  padding: 10px 18px;
  background: linear-gradient(90deg, rgba(110,231,167,.06), transparent 40%);
  border-bottom: 1px solid var(--line);
}
.b-active-pulse {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--good); box-shadow: 0 0 0 0 rgba(110,231,167,.7);
  animation: b-ring 1.8s ease-out infinite;
}
@keyframes b-ring {
  0% { box-shadow: 0 0 0 0 rgba(110,231,167,.7); }
  70% { box-shadow: 0 0 0 10px rgba(110,231,167,0); }
  100% { box-shadow: 0 0 0 0 rgba(110,231,167,0); }
}
.b-active-label { font-family: var(--mono); font-size: 10px; letter-spacing: .14em; color: var(--good); margin-right: 8px; }
.b-active-name { display: flex; align-items: baseline; gap: 4px; font-weight: 500; }
.b-active-app { font-size: 12px; color: var(--text-2); display:inline-flex; align-items:center; gap:6px; }
.b-active-timer { font-family: var(--mono); font-size: 22px; font-variant-numeric: tabular-nums; color: var(--good); font-weight: 500; }
.b-stop-btn {
  padding: 6px 12px; border-radius: 6px;
  background: var(--bg-2); border: 1px solid var(--line-2); color: var(--text-2);
  font-size: 12px;
}
.b-stop-btn:hover { background: var(--bad); color: #2a0808; border-color: var(--bad); }

.b-stats-strip {
  display: flex; align-items: center; gap: 28px;
  padding: 10px 18px;
  border-bottom: 1px solid var(--line);
  background: var(--bg-1);
}
.b-stat { display: flex; align-items: baseline; gap: 8px; font-size: 12px; }
.b-stat-k { color: var(--muted); font-size: 11px; letter-spacing: .08em; text-transform: uppercase; }
.b-stat-v { font-family: var(--mono); font-size: 15px; font-weight: 500; color: var(--text); }
.b-stats-spacer { flex: 1; }
.b-stat-caption { font-size: 11px; color: var(--muted); font-family: var(--mono); }
.b-stat-focus { position: relative; padding-right: 80px; }
.b-stat-spark { position: absolute; right: 0; bottom: 2px; width: 72px; height: 4px; background: var(--bg-3); border-radius: 2px; overflow: hidden; }
.b-stat-spark-fill { height: 100%; background: linear-gradient(90deg, var(--warn), var(--good)); }

.b-split { display: grid; grid-template-columns: 1fr 420px; flex: 1; overflow: hidden; }

.b-tasks { border-right: 1px solid var(--line); display: flex; flex-direction: column; overflow: hidden; }
.b-tasks-head {
  display: grid; grid-template-columns: 1.5fr 70px 1.6fr 40px 80px 70px;
  gap: 12px; padding: 8px 18px;
  border-bottom: 1px solid var(--line);
  font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted);
  background: var(--bg);
}
.b-col-dur, .b-col-sw { text-align: right; }
.b-tasks-body { overflow-y: auto; }
.b-task-row {
  display: grid; grid-template-columns: 1.5fr 70px 1.6fr 40px 80px 70px;
  gap: 12px; padding: 10px 18px; cursor: pointer;
  border-bottom: 1px solid var(--line);
  align-items: center;
  transition: background .1s;
}
.b-task-row:hover { background: var(--bg-1); }
.b-task-active { background: var(--bg-2); box-shadow: inset 3px 0 0 var(--good); }
.b-task-name { font-weight: 500; }
.b-col-name { display: flex; align-items: center; gap: 10px; overflow: hidden; }
.b-col-name .b-task-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.b-task-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted-2); flex-shrink: 0; }
.b-task-live { width: 8px; height: 8px; border-radius: 50%; background: var(--good); box-shadow: 0 0 8px var(--good); flex-shrink: 0; animation: a-pulse 2s ease-in-out infinite; }
.b-mono { font-family: var(--mono); font-size: 12px; color: var(--text-2); }
.b-col-sw, .b-col-dur { text-align: right; }
.b-stack { display: flex; height: 10px; border-radius: 3px; overflow: hidden; background: var(--bg-3); }
.b-stack-slice { min-width: 0; }
.b-focus-bar { height: 4px; background: var(--bg-3); border-radius: 2px; overflow: hidden; }
.b-focus-fill { height: 100%; background: linear-gradient(90deg, var(--warn), var(--good)); }

.b-detail { overflow-y: auto; padding: 18px 20px; background: var(--bg-1); display: flex; flex-direction: column; gap: 14px; }
.b-detail-head { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
.b-detail-kicker { font-size: 10px; text-transform: uppercase; letter-spacing: .14em; color: var(--good); margin-bottom: 4px; }
.b-detail-title { font-size: 18px; font-weight: 600; letter-spacing: -.01em; margin-bottom: 4px; }
.b-detail-meta { font-size: 12px; color: var(--muted); }
.b-detail-focus { text-align: center; background: var(--bg-2); border: 1px solid var(--line); border-radius: 8px; padding: 8px 12px; }
.b-detail-focus-num { font-size: 22px; font-weight: 600; font-family: var(--mono); color: var(--good); }
.b-detail-focus-label { font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); }

.b-micro {
  position: relative; height: 24px; border-radius: 4px; overflow: hidden;
  background: var(--bg-2); border: 1px solid var(--line);
}
.b-micro-seg { position: absolute; top: 0; bottom: 0; }

.b-detail-section { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-top: 6px; }
.b-break { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px; }
.b-break-row {
  display: grid; grid-template-columns: 8px 80px 1fr 40px 56px;
  gap: 10px; align-items: center; font-size: 12px;
}
.b-break-name { color: var(--text-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.b-break-bar { height: 4px; background: var(--bg-2); border-radius: 2px; overflow: hidden; }
.b-break-fill { height: 100%; }

.b-events { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 2px; }
.b-event {
  display: grid; grid-template-columns: 50px 8px 80px 1fr 50px;
  gap: 8px; align-items: center; padding: 4px 6px; border-radius: 4px;
  font-size: 11px;
}
.b-event:hover { background: var(--bg-2); }
.b-event-time { color: var(--muted); }
.b-event-app { color: var(--text-2); }
.b-event-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.b-event-dur { text-align: right; color: var(--text-2); }

.b-cmd-wrap {
  position: fixed; inset: 0; background: rgba(0,0,0,.55); backdrop-filter: blur(8px);
  display: flex; align-items: flex-start; justify-content: center; padding-top: 12vh; z-index: 200;
}
.b-cmd { width: 540px; background: var(--bg-2); border: 1px solid var(--line-2); border-radius: 12px; box-shadow: 0 24px 64px rgba(0,0,0,.6); overflow: hidden; }
.b-cmd-input { width: 100%; padding: 16px 18px; background: transparent; border: 0; outline: 0; font-size: 15px; border-bottom: 1px solid var(--line); }
.b-cmd-list { list-style: none; margin: 0; padding: 6px; max-height: 320px; overflow-y: auto; }
.b-cmd-item { display: flex; align-items: center; gap: 12px; padding: 8px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; }
.b-cmd-sel, .b-cmd-item:hover { background: var(--bg-3); }
.b-cmd-kind { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); font-family: var(--mono); width: 52px; }
.b-cmd-hint { margin-left: auto; font-size: 11px; }
.b-cmd-foot { display: flex; gap: 16px; padding: 8px 14px; border-top: 1px solid var(--line); font-size: 11px; color: var(--muted); background: var(--bg-1); }

/* ===================== DIRECTION C — narrative ribbon ===================== */
.c-root { background: #0b0c10; min-height: 100vh; padding: 40px 24px 100px; }
.c-canvas { max-width: 960px; margin: 0 auto; }
.c-head { display: grid; grid-template-columns: 1fr auto; align-items: end; gap: 24px; margin-bottom: 32px; }
.c-kicker { font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.c-h1 {
  font-family: var(--serif);
  font-size: 52px; letter-spacing: -.02em; line-height: 1.02;
  margin: 0; font-weight: 400;
  color: var(--text);
}
.c-head-stats { display: flex; gap: 28px; }
.c-stat-v { font-family: var(--serif); font-size: 28px; font-weight: 400; letter-spacing: -.01em; color: var(--text); white-space: nowrap; }
.c-stat-suffix { font-family: var(--sans); font-size: 13px; color: var(--muted); margin-left: 2px; }
.c-stat-l { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }

.c-strip { margin-bottom: 32px; }
.c-strip-track {
  position: relative; height: 40px; background: var(--bg-1); border-radius: 4px;
  overflow: hidden; border: 1px solid var(--line);
}
.c-strip-seg { position: absolute; top: 0; bottom: 0; opacity: .86; }
.c-strip-divider { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(255,255,255,.25); pointer-events: none; }
.c-strip-divider-label {
  position: absolute; top: -18px; left: 4px; font-size: 9px; color: var(--muted);
  white-space: nowrap; letter-spacing: .04em;
  max-width: 140px; overflow: hidden; text-overflow: ellipsis;
}
.c-strip-axis { position: relative; height: 18px; margin-top: 8px; }
.c-strip-axis span {
  position: absolute; top: 0; transform: translateX(-50%);
  font-family: var(--mono); font-size: 10px; color: var(--muted);
}
.c-strip-now {
  color: var(--accent) !important;
  transform: translateX(-100%) !important;
}

.c-active-card {
  margin-bottom: 56px;
  padding: 28px 32px;
  background:
    radial-gradient(600px 200px at 0% 0%, rgba(140,215,255,.08), transparent 60%),
    var(--bg-1);
  border: 1px solid var(--line-2);
  border-radius: 16px;
}
.c-active-grid {
  display: grid;
  grid-template-columns: 1fr auto;
  grid-template-areas:
    "kicker timer"
    "title timer"
    "meta   meta"
    "actions actions";
  gap: 4px 20px;
  margin-bottom: 18px;
}
.c-active-kicker {
  grid-area: kicker; display:inline-flex; align-items:center; gap: 8px;
  font-family: var(--mono); font-size: 11px; letter-spacing: .14em; color: var(--accent);
}
.c-active-pulse {
  width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
  box-shadow: 0 0 0 0 rgba(140,215,255,.7); animation: b-ring 1.8s ease-out infinite;
}
.c-active-title {
  grid-area: title; font-family: var(--serif); font-size: 34px; letter-spacing: -.015em; font-weight: 400; line-height: 1.1; margin-top: 4px;
}
.c-active-timer {
  grid-area: timer; align-self: start;
  font-family: var(--mono); font-size: 46px; font-weight: 500; color: var(--accent); font-variant-numeric: tabular-nums; letter-spacing: -.02em;
  line-height: 1;
}
.c-active-meta { grid-area: meta; color: var(--muted); font-size: 13px; margin-top: 10px; }
.c-active-actions { grid-area: actions; display: flex; gap: 8px; margin-top: 14px; }
.c-btn { padding: 9px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; }
.c-btn-ghost { color: var(--text-2); border: 1px solid var(--line-2); }
.c-btn-ghost:hover { color: var(--text); border-color: var(--text-2); }
.c-btn-stop { background: var(--bg-3); color: var(--text); border: 1px solid var(--line-2); }
.c-btn-stop:hover { background: var(--bad); color: #2a0808; border-color: var(--bad); }
.c-btn-switch { margin-left: auto; color: var(--accent); border: 1px solid rgba(140,215,255,.3); }
.c-btn-switch:hover { background: rgba(140,215,255,.08); }

.c-active-mini {
  position: relative; height: 6px; background: var(--bg-2); border-radius: 3px; overflow: hidden;
}
.c-active-mini-seg { position: absolute; top: 0; bottom: 0; }

.c-ribbon-header { margin-bottom: 28px; }
.c-ribbon-header h2 {
  font-family: var(--serif); font-size: 28px; letter-spacing: -.01em; font-weight: 400; margin: 0 0 6px;
}
.c-ribbon-header p { color: var(--muted); font-size: 14px; margin: 0; }

.c-ribbon { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; }
.c-scene {
  display: grid;
  grid-template-columns: 4px 100px 1fr;
  gap: 22px;
  padding: 22px 0;
  border-bottom: 1px solid var(--line);
  position: relative;
}
.c-scene:last-child { border-bottom: 0; }
.c-scene-rail { width: 3px; border-radius: 2px; opacity: .7; }
.c-scene-time { font-family: var(--mono); font-size: 11px; color: var(--muted); padding-top: 4px; }
.c-scene-start { color: var(--text-2); font-size: 13px; }
.c-scene-dur { font-size: 11px; margin-top: 2px; }
.c-scene-end { color: var(--muted-2); margin-top: 2px; }
.c-scene-body { min-width: 0; }
.c-scene-head { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; margin-bottom: 12px; }
.c-scene-idx { font-family: var(--mono); font-size: 10px; letter-spacing: .14em; color: var(--muted-2); text-transform: uppercase; margin-bottom: 4px;}
.c-scene-title { font-family: var(--serif); font-size: 22px; font-weight: 400; letter-spacing: -.01em; margin: 0; }
.c-scene-mood {
  text-align: center; padding: 6px 12px; border-radius: 8px;
  border: 1px solid var(--line); background: var(--bg-1); min-width: 72px;
}
.c-scene-mood-num { font-family: var(--mono); font-weight: 500; font-size: 18px; }
.c-scene-mood-label { font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-top: 2px; }
.c-scene-mood-deep      { background: rgba(110,231,167,.06); border-color: rgba(110,231,167,.2); }
.c-scene-mood-deep .c-scene-mood-num { color: var(--good); }
.c-scene-mood-mixed     { background: rgba(251,191,36,.06); border-color: rgba(251,191,36,.2); }

<aside id="tweaks" class="tweaks" aria-label="Tweaks">
  <button class="tweaks-close" id="tweaks-close" aria-label="Close tweaks">×</button>
  <h3>Tweaks</h3>

    </div>
  </div>

    <div class="tweaks-seg" data-tweak="accent">
      <button data-val="sky" style="--swatch:#8cd7ff">Sky</button>
      <button data-val="mint" style="--swatch:#6ee7a7">Mint</button>
      <button data-val="peach" style="--swatch:#fbbf24">Peach</button>
      <button data-val="violet" style="--swatch:#c084fc">Violet</button>
    </div>
  </div>

  <div style="font-size:11px;color:var(--muted);margin-top:6px;">
    Press <kbd>⌘K</kbd> in Direction B for the command bar.
  </div>

<script>
  // ---------------- Tweaks state + wiring ----------------
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "direction": "D",
    "density": "cozy",
    "accent": "peach"
  }/*EDITMODE-END*/;

  const ACCENTS = {
    sky:    { a: "#8cd7ff", a2: "#6fb3d6" },
    mint:   { a: "#6ee7a7", a2: "#34d399" },
    peach:  { a: "#fbbf24", a2: "#f59e0b" },
    violet: { a: "#c084fc", a2: "#a78bfa" },
  };

  const state = { ...TWEAK_DEFAULTS };
  try {
    const saved = localStorage.getItem("bt:tweaks");
    if (saved) Object.assign(state, JSON.parse(saved));
  } catch {}

  function applyState() {
    document.body.classList.toggle("dense", state.density === "dense");
    document.body.classList.toggle("cozy",  state.density !== "dense");
    const accent = ACCENTS[state.accent] || ACCENTS.sky;
    document.documentElement.style.setProperty("--accent", accent.a);
    document.documentElement.style.setProperty("--accent-2", accent.a2);

    // Update segmented button states
    document.querySelectorAll(".tweaks-seg").forEach(seg => {
      const key = seg.dataset.tweak;
      seg.querySelectorAll("button").forEach(b => {
        b.classList.toggle("active", b.dataset.val === state[key]);
      });
    });

    // Persist
    try { localStorage.setItem("bt:tweaks", JSON.stringify(state)); } catch {}

    // Tell host (for on-disk persistence via __edit_mode_set_keys)
    if (window.parent !== window) {
      window.parent.postMessage({ type: "__edit_mode_set_keys", edits: state }, "*");
    }

    // Notify React to re-render
    window.dispatchEvent(new CustomEvent("tweaks:change", { detail: { ...state } }));
  }

  document.querySelectorAll(".tweaks-seg").forEach(seg => {
    seg.addEventListener("click", e => {
      const btn = e.target.closest("button");
      if (!btn) return;
      state[seg.dataset.tweak] = btn.dataset.val;
      applyState();
    });
  });

  // Host integration: Tweaks toggle ----------------------------------------
  const tweaksEl = document.getElementById("tweaks");
  window.addEventListener("message", e => {
    if (!e.data || typeof e.data !== "object") return;
    if (e.data.type === "__activate_edit_mode") tweaksEl.classList.add("open");
    if (e.data.type === "__deactivate_edit_mode") tweaksEl.classList.remove("open");
  });
  document.getElementById("tweaks-close").addEventListener("click", () => {
    tweaksEl.classList.remove("open");
  });
  // Announce availability
  if (window.parent !== window) {
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
  } else {
    // Standalone mode (e.g. GitHub Pages demo): auto-open the tweaks panel
    // so visitors can switch between directions / densities / accents.
    tweaksEl.classList.add("open");
  }

  // Initial apply
  applyState();
</script>

function iso(h, m, s = 0) {
  const d = new Date(NOW);
  d.setHours(h, m, s, 0);
  return d.toISOString();
}

let eventId = 1;
function ev(app, title, startIso, durSec) {
  return {
    id: eventId++,
    timestamp: startIso,
    duration: durSec,
    data: { app, title },
  };
}

// Helper: generate a stream of events for a session
function stream(startH, startM, parts) {
  const events = [];
  let cursor = new Date(NOW);
  cursor.setHours(startH, startM, 0, 0);
  for (const [app, title, mins] of parts) {
    events.push(ev(app, title, cursor.toISOString(), mins * 60));
    cursor = new Date(cursor.getTime() + mins * 60 * 1000);

  return events;

<script>
// Shared pure helpers (formatters, colors, derived metrics).
// Mirrors logic from the real app's lib/ files where relevant.

function formatDuration(seconds) {
  const s = Math.max(0, Math.round(seconds));
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  const pad = (n) => n.toString().padStart(2, "0");
  if (h > 0) return `${h}:${pad(m)}:${pad(sec)}`;
  return `${m}:${pad(sec)}`;
}

function formatDurationShort(seconds) {
  const s = Math.max(0, Math.round(seconds));
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  if (h > 0) return m > 0 ? `${h}h ${m}m` : `${h}h`;
  return `${m}m`;
}

function formatClock(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit" });
}

function sessionDurationSec(session, nowMs) {
  const start = new Date(session.startedAt).getTime();
  const end = session.endedAt ? new Date(session.endedAt).getTime() : nowMs;
  return Math.max(0, (end - start) / 1000);
}

// Deterministic color per app — curated palette instead of hash->hsl.
// Keys matched case-insensitively; fallback cycles the palette by hash.
const APP_PALETTE = {
  "vs code":       "#7AA2F7",
  "figma":         "#E879F9",
  "linear":        "#A78BFA",
  "slack":         "#F59E0B",
  "gmail":         "#F87171",
  "chrome":        "#60A5FA",
  "terminal":      "#34D399",
  "notion":        "#E5E7EB",
  "zoom":          "#38BDF8",
};
const FALLBACK_COLORS = ["#7AA2F7","#E879F9","#A78BFA","#F59E0B","#F87171","#60A5FA","#34D399","#E5E7EB","#38BDF8","#FB7185","#C084FC"];
function appColor(app) {
  const key = (app || "").toLowerCase();
  if (APP_PALETTE[key]) return APP_PALETTE[key];
  let h = 0;
  for (let i = 0; i < key.length; i++) h = (h * 31 + key.charCodeAt(i)) >>> 0;
  return FALLBACK_COLORS[h % FALLBACK_COLORS.length];
}

// Category: creative / communication / code / meeting / browse
const APP_CATEGORY = {
  "vs code":  "code",
  "terminal": "code",
  "figma":    "creative",
  "notion":   "creative",
  "linear":   "creative",
  "slack":    "comm",
  "gmail":    "comm",
  "zoom":     "meeting",
  "chrome":   "browse",
};
const CATEGORY_COLOR = {
  code:     "#7AA2F7",
  creative: "#E879F9",
  comm:     "#F59E0B",
  meeting:  "#38BDF8",
  browse:   "#94A3B8",
};
function appCategory(app) { return APP_CATEGORY[(app||"").toLowerCase()] || "browse"; }

// Event segments + derived stats ------------------------------------------------
function toSegments(events) {
  const sorted = [...events].sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
  const segs = [];
  for (const e of sorted) {
    const start = new Date(e.timestamp).getTime();
    const end = start + e.duration * 1000;
    const last = segs[segs.length - 1];
    if (last && last.app === e.data.app && start - last.end <= 1000) {
      last.end = Math.max(last.end, end);
      last.ids.push(e.id);
    } else {
      segs.push({ app: e.data.app, title: e.data.title, start, end, ids: [e.id] });
    }
  }
  return segs;
}

function contextSwitches(events) {
  return Math.max(0, toSegments(events).length - 1);
}

function longestStretch(events) {
  const segs = toSegments(events);
  if (segs.length === 0) return null;
  let best = segs[0], bestSec = (best.end - best.start) / 1000;
  for (const s of segs) {
    const sec = (s.end - s.start) / 1000;
    if (sec > bestSec) { best = s; bestSec = sec; }
  }
  return { app: best.app, seconds: bestSec };
}

// Merge events into per-app totals
function groupByApp(events, startMs, endMs) {
  const totals = new Map();
  for (const e of events) {
    const start = new Date(e.timestamp).getTime();
    const end = start + e.duration * 1000;
    const cs = Math.max(start, startMs);
    const ce = Math.min(end, endMs);
    const sec = Math.max(0, (ce - cs) / 1000);
    if (sec <= 0) continue;
    totals.set(e.data.app, (totals.get(e.data.app) || 0) + sec);
  }
  const arr = [...totals.entries()].map(([app, seconds]) => ({ app, seconds }));
  const total = arr.reduce((a, b) => a + b.seconds, 0);
  arr.forEach(a => a.percent = total > 0 ? (a.seconds / total) * 100 : 0);
  arr.sort((a, b) => b.seconds - a.seconds);
  return arr;
}

// Focus score: 0..1 — weights longest stretch, penalizes switches and comm time.
function focusScore(session, nowMs) {
  const durSec = sessionDurationSec(session, nowMs);
  if (durSec < 60) return null;
  const segs = toSegments(session.events);
  if (segs.length === 0) return 0.5;
  const longest = segs.reduce((a, s) => Math.max(a, s.end - s.start), 0) / 1000;
  const switches = Math.max(0, segs.length - 1);
  const longestRatio = Math.min(1, longest / Math.max(60, durSec));
  const switchPenalty = Math.min(1, switches / 8);
  const score = 0.55 * longestRatio + 0.45 * (1 - switchPenalty);
  return Math.max(0, Math.min(1, score));
}

function dayFocusScore(sessions, nowMs) {
  const scored = sessions
    .map(s => ({ dur: sessionDurationSec(s, nowMs), score: focusScore(s, nowMs) }))
    .filter(x => x.score != null);
  const totalDur = scored.reduce((a, b) => a + b.dur, 0);
  if (totalDur === 0) return 0;
  return scored.reduce((a, b) => a + b.score * b.dur, 0) / totalDur;
}

// Active event detection (during an active session, the most recent event is "live")
function currentEvent(session, nowMs) {
  if (session.events.length === 0) return null;
  const last = session.events[session.events.length - 1];
  return last;
}

window.__H__ = {
  formatDuration, formatDurationShort, formatClock,
  sessionDurationSec,
  appColor, appCategory, CATEGORY_COLOR, APP_PALETTE,
  toSegments, contextSwitches, longestStretch, groupByApp,
  focusScore, dayFocusScore, currentEvent,
};

const { useState, useEffect, useMemo, useRef } = React;
const H = window.__H__;
const DATA = window.__APP__;

// Live-updating "now" tick (for the running timer).
function useLiveNow(active) {
  const [now, setNow] = useState(() => Date.now());
  useEffect(() => {
    if (!active) return;
    const id = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(id);
  }, [active]);
  return now;
}

// Fake "elapsed" for the demo: we pin NOW to a fixed demo moment,
// but let the active session timer tick forward from that baseline
// so the page feels alive.
function useDemoElapsed(startIso) {
  const baseline = DATA.NOW.getTime();
  const mountedAt = useRef(Date.now());
  useLiveNow(true);
  const elapsed = (baseline - new Date(startIso).getTime()) / 1000
    + (Date.now() - mountedAt.current) / 1000;
  return elapsed;
}

Object.assign(window, { useLiveNow, useDemoElapsed });

</script>

  const nowMs = window.__APP__.NOW.getTime();

  const totalSec = sessions.reduce((a, s) => a + H.sessionDurationSec(s, nowMs), 0);
  const totalSwitches = sessions.reduce((a, s) => a + H.contextSwitches(s.events), 0);
  const focus = H.dayFocusScore(sessions, nowMs);
  const longest = sessions
    .map(s => ({ name: s.name, ...(H.longestStretch(s.events) || {}) }))
    .filter(x => x.app)
    .sort((a, b) => b.seconds - a.seconds)[0];

  // Full-day app totals
  const allEvents = sessions.flatMap(s => s.events);
  const dayStart = new Date(sessions[0].startedAt).getTime();
  const appTotals = H.groupByApp(allEvents, dayStart, nowMs).slice(0, 6);

  const [taskName, setTaskName] = useStateA("");
  const inputRef = useRefA(null);

  return (
    <div className="a-root">
      <TopBar tab={tab} setTab={setTab} />

      <div className="a-hero">
        <div className="a-hero-left">
          <div className="a-hero-label">Currently tracking</div>
          <div className="a-hero-title">{active.name}</div>
          <div className="a-hero-meta">
            <span>Started {H.formatClock(active.startedAt)}</span>
            <span className="a-dot">·</span>
            <span>
              In <strong style={{ color: H.appColor(H.currentEvent(active).data.app) }}>
                {H.currentEvent(active).data.app}
              </strong>
              {" — "}
              <span className="a-muted">{H.currentEvent(active).data.title}</span>
            </span>
          </div>
        </div>
        <div className="a-hero-right">
          <div className="a-hero-timer">{H.formatDuration(elapsedSec)}</div>
          <div className="a-hero-actions">
            <button className="a-btn a-btn-ghost">Pause</button>
            <button className="a-btn a-btn-stop">Stop task</button>
          </div>
        </div>
      </div>

      <div className="a-quickstart">
        <span className="a-quickstart-icon" aria-hidden>›</span>
        <input
          ref={inputRef}
          value={taskName}
          onChange={e => setTaskName(e.target.value)}
          placeholder="Start a different task…"
          className="a-quickstart-input"
        />
        <div className="a-quickstart-recent">
          {window.__APP__.RECENT_TASK_NAMES.slice(0, 4).map(n => (
            <button key={n} className="a-chip" onClick={() => setTaskName(n)}>{n}</button>
          ))}
        </div>
        <kbd className="a-kbd">⏎</kbd>
      </div>

      <div className="a-stats">
        <StatCard label="Tracked today"  value={H.formatDurationShort(totalSec)} hint={`${completed.length} tasks · 1 active`} />
        <StatCard label="Focus score"    value={`${Math.round(focus * 100)}`} suffix="/100"
                  accent={focus >= 0.75 ? "good" : focus >= 0.5 ? "ok" : "bad"}
                  hint={focus >= 0.75 ? "Deep day" : focus >= 0.5 ? "Mixed" : "Choppy"} />
        <StatCard label="Context switches" value={String(totalSwitches)} hint="across all tasks today" />
        <StatCard label="Longest stretch" value={longest ? H.formatDurationShort(longest.seconds) : "—"}
                  hint={longest ? `${longest.app} · ${longest.name}` : ""} accent="longest"
                  accentColor={longest && H.appColor(longest.app)} />
      </div>

      <div className="a-grid">
        <section className="a-panel a-timeline-panel">
          <div className="a-panel-head">
            <h2>Timeline</h2>
            <div className="a-panel-sub">{H.formatClock(sessions[0].startedAt)} – now</div>
          </div>
          <TimelineA sessions={sessions} nowMs={nowMs} />
        </section>

        <section className="a-panel a-apps-panel">
          <div className="a-panel-head">
            <h2>App usage</h2>
            <div className="a-panel-sub">Today</div>
          </div>
          <AppsPanel totals={appTotals} />
        </section>
      </div>

      <section className="a-panel">
        <div className="a-panel-head">
          <h2>Completed today</h2>
          <div className="a-panel-sub">{completed.length} tasks</div>
        </div>
        <ul className="a-tasklist">
          {[...completed].reverse().map(s => <TaskRowA key={s.id} session={s} />)}
        </ul>
      </section>
    </div>
  );
}

function StatCard({ label, value, suffix, hint, accent, accentColor }) {
  return (
    <div className={`a-stat a-stat-${accent || "base"}`}>
      <div className="a-stat-label">{label}</div>
      <div className="a-stat-value">
        <span style={accent === "longest" && accentColor ? { color: accentColor } : null}>{value}</span>
        {suffix && <span className="a-stat-suffix">{suffix}</span>}
      </div>
      {hint && <div className="a-stat-hint">{hint}</div>}
    </div>

}

function TimelineA({ sessions, nowMs }) {
  const sorted = [...sessions].sort((a,b) => new Date(a.startedAt) - new Date(b.startedAt));
  const first = new Date(sorted[0].startedAt).getTime();
  const last = nowMs;
  const range = last - first;

  // Round ticks to nice hours
  const startHour = new Date(first); startHour.setMinutes(0,0,0);
  const endHour = new Date(last); endHour.setMinutes(60,0,0);
  const ticks = [];
  for (let t = startHour.getTime(); t <= endHour.getTime(); t += 60 * 60 * 1000) ticks.push(t);

  const pct = t => ((t - first) / range) * 100;

  return (
    <div className="a-tl">
      <div className="a-tl-axis">
        {ticks.map(t => (
          <div key={t} className="a-tl-tick" style={{ left: `${pct(t)}%` }}>
            <span>{new Date(t).toLocaleTimeString(undefined, { hour: "numeric" })}</span>
          </div>
        ))}
      </div>
      <div className="a-tl-rows">
        {sorted.map((s, i) => {
          const sStart = new Date(s.startedAt).getTime();
          const sEnd = s.endedAt ? new Date(s.endedAt).getTime() : nowMs;
          const isActive = !s.endedAt;
          return (
            <div key={s.id} className="a-tl-row">
              <div className="a-tl-label" title={s.name}>{s.name}</div>
              <div className="a-tl-track">
                {ticks.map(t => (
                  <div key={t} className="a-tl-gridline" style={{ left: `${pct(t)}%` }} />
                ))}
                <div
                  className={`a-tl-bar ${isActive ? "is-active" : ""}`}
                  style={{
                    left: `${pct(sStart)}%`,
                    width: `${pct(sEnd) - pct(sStart)}%`,
                  }}
                >
                  {s.events.map(ev => {
                    const evStart = new Date(ev.timestamp).getTime();
                    const evEnd = evStart + ev.duration * 1000;
                    const cs = Math.max(evStart, sStart);
                    const ce = Math.min(evEnd, sEnd);
                    if (ce <= cs) return null;
                    const w = ((ce - cs) / (sEnd - sStart)) * 100;
                    const l = ((cs - sStart) / (sEnd - sStart)) * 100;
                    return (
                      <div
                        key={ev.id}
                        className="a-tl-ev"
                        title={`${ev.data.app} — ${ev.data.title}`}
                        style={{
                          left: `${l}%`,
                          width: `${w}%`,
                          background: H.appColor(ev.data.app),
                        }}
                      />
                    );
                  })}
                </div>
              </div>
              <div className="a-tl-dur">{H.formatDurationShort(H.sessionDurationSec(s, nowMs))}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function AppsPanel({ totals }) {
  const max = totals[0]?.seconds || 1;
  return (
    <ul className="a-apps">
      {totals.map(t => (
        <li key={t.app} className="a-apps-row">

            {t.app}
          </div>
          <div className="a-apps-bar">
            <div className="a-apps-fill" style={{ width: `${(t.seconds/max)*100}%`, background: H.appColor(t.app) }} />
          </div>
          <div className="a-apps-dur">{H.formatDurationShort(t.seconds)}</div>
        </li>
      ))}
    </ul>

}

function TaskRowA({ session }) {
  const nowMs = window.__APP__.NOW.getTime();
  const dur = H.sessionDurationSec(session, nowMs);
  const switches = H.contextSwitches(session.events);
  const score = H.focusScore(session, nowMs);
  const slices = H.groupByApp(session.events, new Date(session.startedAt).getTime(), new Date(session.endedAt).getTime());

  return (
    <li className="a-task">
      <div className="a-task-head">
        <div className="a-task-name">{session.name}</div>
        <div className="a-task-meta">
          <span>{H.formatClock(session.startedAt)} – {H.formatClock(session.endedAt)}</span>
          <span className="a-dot">·</span>
          <span>{switches} switches</span>
        </div>
        <div className="a-task-focus" title="Focus score">
          <div className="a-focus-bar">
            <div className="a-focus-fill" style={{ width: `${(score||0)*100}%` }} />
          </div>
          <span>{Math.round((score||0)*100)}</span>
        </div>
        <div className="a-task-dur">{H.formatDurationShort(dur)}</div>
      </div>
      <div className="a-task-stack">
        {slices.map(s => (
          <div key={s.app} className="a-task-stack-slice"
               title={`${s.app} · ${H.formatDurationShort(s.seconds)} (${s.percent.toFixed(0)}%)`}
               style={{ width: `${s.percent}%`, background: H.appColor(s.app) }} />
        ))}
      </div>
      <div className="a-task-apps">
        {slices.slice(0, 4).map(s => (
          <div key={s.app} className="a-task-app">
            <span className="a-apps-swatch" style={{ background: H.appColor(s.app) }} />
            <span>{s.app}</span>
            <span className="a-muted">{H.formatDurationShort(s.seconds)}</span>
          </div>
        ))}
        {slices.length > 4 && <div className="a-task-app a-muted">+{slices.length - 4}</div>}
      </div>

  );
}

// ==================== WEB / COMPLIANCE VIEW ====================
function WebView() {
  const { ALL_VISITS, DOMAIN_META, CAT_COLOR, NOW } = window.__APP__;
  const todayMs = NOW.getTime();

  const dayMs = 24*60*60*1000;
  const [preset, setPreset] = useStateA("7d");
  const [fromIso, setFromIso] = useStateA(() => new Date(todayMs - 6*dayMs).toISOString().slice(0,10));
  const [toIso, setToIso]     = useStateA(() => new Date(todayMs).toISOString().slice(0,10));
  const [group, setGroup] = useStateA(() => {
    try { return localStorage.getItem("bt:web-group") || "domain"; } catch { return "domain"; }
  });
  React.useEffect(() => { try { localStorage.setItem("bt:web-group", group); } catch {} }, [group]);

  function setPresetRange(p) {
    setPreset(p);
    const d = new Date(todayMs);
    if (p === "today") { setFromIso(d.toISOString().slice(0,10)); setToIso(d.toISOString().slice(0,10)); }
    else if (p === "7d") { setFromIso(new Date(todayMs - 6*dayMs).toISOString().slice(0,10)); setToIso(d.toISOString().slice(0,10)); }
    else if (p === "30d") { setFromIso(new Date(todayMs - 29*dayMs).toISOString().slice(0,10)); setToIso(d.toISOString().slice(0,10)); }
    else if (p === "yesterday") { const y = new Date(todayMs - dayMs); setFromIso(y.toISOString().slice(0,10)); setToIso(y.toISOString().slice(0,10)); }
  }
  function onManualDate(which, val) {
    setPreset("custom");
    if (which === "from") setFromIso(val); else setToIso(val);
  }

  const fromMs = new Date(fromIso + "T00:00:00").getTime();
  const toMs   = new Date(toIso   + "T23:59:59").getTime();
  const visits = useMemoA(() => ALL_VISITS.filter(v => {
    const t = new Date(v.timestamp).getTime();
    return t >= fromMs && t <= toMs;
  }), [fromMs, toMs]);

  const totalSec = visits.reduce((a,v)=>a+v.duration, 0);
  const uniqueDomains = new Set(visits.map(v => v.domain)).size;
  const uniqueCats = new Set(visits.map(v => (DOMAIN_META[v.domain]?.cat) || "Other")).size;

  function fmtDay(iso) {
    const d = new Date(iso + "T00:00:00");
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
  }
  const rangeLabel = fromIso === toIso ? fmtDay(fromIso) : `${fmtDay(fromIso)} – ${fmtDay(toIso)}`;

  function exportCsv() {
    const rows = [["timestamp","domain","url","title","duration_seconds","category"]];
    for (const v of visits) {
      rows.push([
        v.timestamp,
        v.domain,
        v.url,
        (v.title || "").replace(/"/g, '""'),
        v.duration,
        (DOMAIN_META[v.domain]?.cat) || "Other",
      ]);
    }
    const csv = rows.map(r => r.map(c => /[",\n]/.test(String(c)) ? `"${c}"` : c).join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `web-activity-${fromIso}_to_${toIso}.csv`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  function openReport() {
    sessionStorage.setItem("bt:report", JSON.stringify({ fromIso, toIso }));
    const u = new URL(window.location.href);
    u.searchParams.set("report", "1");
    u.searchParams.set("from", fromIso);
    u.searchParams.set("to", toIso);
    window.open(u.toString(), "_blank");
  }

  return (
    <>
      <header className="a-web-head">
        <div>
          <div className="a-web-kicker">Web activity</div>
          <h1 className="a-web-title">Sites you visited</h1>
          <div className="a-web-sub">
            From aw-watcher-web · {rangeLabel} · {uniqueDomains} domains across {uniqueCats} categories
          </div>
        </div>
      </header>

      <div className="a-web-controls">
        <div className="a-range" role="tablist">
          {[["today","Today"],["yesterday","Yesterday"],["7d","Last 7d"],["30d","Last 30d"]].map(([v,l]) => (
            <button key={v} className={preset===v?"active":""} onClick={() => setPresetRange(v)}>{l}</button>
          ))}
          <div className="a-range-sep" />
          <button className={preset==="custom"?"active":""} onClick={() => setPreset("custom")}>Custom</button>
        </div>
        <div className="a-daterange">
          <span className="a-daterange-icon">📅</span>
          <input type="date" value={fromIso} onChange={e => onManualDate("from", e.target.value)} />
          <span className="a-daterange-arrow">→</span>
          <input type="date" value={toIso} onChange={e => onManualDate("to", e.target.value)} />
        </div>
        <div className="a-group-toggle">
          {[["domain","Domain"],["category","Category"],["timeline","Timeline"]].map(([v,l]) => (
            <button key={v} className={group===v?"active":""} onClick={() => setGroup(v)}>{l}</button>
          ))}
        </div>
        <button className="a-export-btn" onClick={exportCsv} title="Export CSV of filtered visits">⤓ Export CSV</button>
        <button className="a-export-btn" onClick={openReport} title="Open printable report">↗ Full report</button>
      </div>

      <div className="a-web-stats">
        <StatCard label="Total web time" value={H.formatDurationShort(totalSec)} hint={`${visits.length} page visits`} />
        <StatCard label="Domains" value={String(uniqueDomains)} hint={`across ${uniqueCats} categories`} />
        <StatCard label="Busiest domain" value={topDomainShort(visits)} hint="by time on page" />
        <StatCard label="Longest session" value={longestVisit(visits)} hint="single tab stretch" />
      </div>

      {group === "domain"   && <DomainsView visits={visits} />}
      {group === "category" && <CategoriesView visits={visits} />}
      {group === "timeline" && <TimelineVisitsView visits={visits} fromIso={fromIso} toIso={toIso} />}
    </>
  );
}

function topDomainShort(visits) {
  const map = new Map();
  for (const v of visits) map.set(v.domain, (map.get(v.domain)||0)+v.duration);
  const top = [...map.entries()].sort((a,b)=>b[1]-a[1])[0];
  return top ? top[0] : "—";
}
function longestVisit(visits) {
  if (!visits.length) return "—";
  const max = visits.reduce((a,v)=>Math.max(a, v.duration), 0);
  return H.formatDurationShort(max);
}

function DomainsView({ visits }) {
  const { DOMAIN_META, CAT_COLOR } = window.__APP__;
  const [openDom, setOpenDom] = useStateA(null);

  const byDom = useMemoA(() => {
    const map = new Map();
    for (const v of visits) {
      if (!map.has(v.domain)) map.set(v.domain, { domain: v.domain, seconds: 0, count: 0, urls: new Map() });
      const e = map.get(v.domain);
      e.seconds += v.duration;
      e.count += 1;
      const key = v.url;
      if (!e.urls.has(key)) e.urls.set(key, { url: v.url, title: v.title, seconds: 0, count: 0 });
      const u = e.urls.get(key);
      u.seconds += v.duration; u.count += 1;
    }
    return [...map.values()].map(e => ({
      ...e,
      urls: [...e.urls.values()].sort((a,b)=>b.seconds-a.seconds),
    })).sort((a,b)=>b.seconds-a.seconds);
  }, [visits]);

  const max = byDom[0]?.seconds || 1;

  return (
    <div className="a-domain-list">
      <div className="a-domain-head">
        <div></div>
        <div>Domain</div>
        <div>Category</div>
        <div>Visits</div>
        <div>Share</div>
        <div>Time</div>
      </div>
      {byDom.map(d => {
        const meta = DOMAIN_META[d.domain] || { cat: "Other", favicon: d.domain[0]?.toUpperCase() || "?" };
        const color = CAT_COLOR[meta.cat] || CAT_COLOR.Other;
        const pct = (d.seconds / max) * 100;
        const isOpen = openDom === d.domain;
        return (
          <React.Fragment key={d.domain}>
            <div className="a-domain-row" onClick={() => setOpenDom(isOpen ? null : d.domain)} style={{cursor:"pointer"}}>
              <div className="a-fav" style={{ background: color }}>{meta.favicon}</div>
              <div className="a-domain-name">
                <div className="a-domain-dom">{d.domain}</div>
                <div className="a-domain-urls">{d.urls.length} page{d.urls.length!==1?"s":""} · click to expand</div>
              </div>
              <div><span className="a-cat-chip"><span className="a-cat-dot" style={{background: color}} />{meta.cat}</span></div>
              <div className="a-domain-visits">{d.count}</div>
              <div className="a-domain-bar"><div className="a-domain-fill" style={{width: `${pct}%`, background: color}} /></div>
              <div className="a-domain-dur">{H.formatDurationShort(d.seconds)}</div>
            </div>
            {isOpen && (
              <div className="a-domain-expand">
                {d.urls.slice(0, 12).map(u => (
                  <div key={u.url} className="a-domain-url-row">
                    <div className="a-domain-url-title" title={u.url}>{u.title || u.url}</div>
                    <div className="a-domain-url-visits">{u.count}×</div>
                    <div className="a-domain-url-dur">{H.formatDurationShort(u.seconds)}</div>
                  </div>
                ))}
              </div>
            )}
          </React.Fragment>
        );
      })}
      {byDom.length === 0 && (
        <div style={{padding: "40px", textAlign: "center", color: "var(--muted)"}}>
          No web visits in this range.
        </div>
      )}
    </div>
  );
}

function CategoriesView({ visits }) {
  const { DOMAIN_META, CAT_COLOR } = window.__APP__;
  const byCat = useMemoA(() => {
    const map = new Map();
    for (const v of visits) {
      const cat = DOMAIN_META[v.domain]?.cat || "Other";
      if (!map.has(cat)) map.set(cat, { cat, seconds: 0, count: 0, domains: new Map() });
      const e = map.get(cat);
      e.seconds += v.duration; e.count += 1;
      e.domains.set(v.domain, (e.domains.get(v.domain)||0) + v.duration);
    }
    return [...map.values()].map(e => ({
      ...e,
      domains: [...e.domains.entries()].map(([d, s]) => ({ domain: d, seconds: s })).sort((a,b)=>b.seconds-a.seconds),
    })).sort((a,b)=>b.seconds-a.seconds);
  }, [visits]);

  const total = byCat.reduce((a,c)=>a+c.seconds, 0) || 1;
  // Treemap-ish sizes: top 2 span 3 cols, next span 2, rest span 1
  return (
    <>
      <div className="a-cat-grid">
        {byCat.map((c, i) => {
          const color = CAT_COLOR[c.cat] || CAT_COLOR.Other;
          const pct = (c.seconds/total)*100;
          const span = i < 2 ? 3 : i < 4 ? 2 : 1;
          const rowSpan = i < 2 ? 2 : 1;
          return (
            <div key={c.cat} className="a-cat-cell"
                 style={{ gridColumn: `span ${span}`, gridRow: `span ${rowSpan}`,
                          background: `linear-gradient(135deg, ${color}22, ${color}08)`,
                          borderColor: `${color}44` }}>
              <div>
                <div className="a-cat-cell-name" style={{color}}>{c.cat}</div>
                <div className="a-cat-cell-dur">{H.formatDurationShort(c.seconds)}</div>
              </div>
              <div className="a-cat-cell-meta">
                <span>{pct.toFixed(0)}% of web time</span>
                <span>{c.domains.length} domain{c.domains.length!==1?"s":""}</span>
              </div>
            </div>
          );
        })}
      </div>

      <div style={{display:"grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 12}}>
        {byCat.map(c => {
          const color = CAT_COLOR[c.cat] || CAT_COLOR.Other;
          return (
            <section key={c.cat} className="a-cat-panel">
              <div className="a-cat-panel-head">
                <div className="a-cat-panel-title">
                  <span className="a-cat-dot" style={{background: color, width: 8, height: 8}} />
                  {c.cat}
                </div>
                <div className="a-panel-sub">{H.formatDurationShort(c.seconds)}</div>
              </div>
              <ul className="a-cat-domains">
                {c.domains.slice(0, 8).map(d => (
                  <li key={d.domain}><span>{d.domain}</span><span>{H.formatDurationShort(d.seconds)}</span></li>
                ))}
              </ul>
            </section>
          );
        })}
      </div>
    </>
  );
}

function TimelineVisitsView({ visits, fromIso, toIso }) {
  const { DOMAIN_META, CAT_COLOR } = window.__APP__;
  const byDay = useMemoA(() => {
    const map = new Map();
    for (const v of visits) {
      const key = new Date(v.timestamp).toISOString().slice(0,10);
      if (!map.has(key)) map.set(key, { key, visits: [], seconds: 0 });
      const e = map.get(key);
      e.visits.push(v); e.seconds += v.duration;
    }
    // Build list of all days in range
    const days = [];
    const fromMs = new Date(fromIso + "T00:00:00").getTime();
    const toMs   = new Date(toIso   + "T00:00:00").getTime();
    for (let t = toMs; t >= fromMs; t -= 24*60*60*1000) {
      const k = new Date(t).toISOString().slice(0,10);
      days.push(map.get(k) || { key: k, visits: [], seconds: 0 });
    }
    return days;
  }, [visits, fromIso, toIso]);

  return (
    <div className="a-webtl">
      {byDay.map(d => {
        const sorted = [...d.visits].sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
        const dateObj = new Date(d.key + "T00:00:00");
        return (
          <div key={d.key} className="a-webtl-day">
            <div className="a-webtl-date">
              <div className="a-webtl-date-big">{dateObj.toLocaleDateString(undefined,{weekday:"short"})}</div>
              <div>{dateObj.toLocaleDateString(undefined,{month:"short",day:"numeric"})}</div>
              <div className="a-webtl-total">{H.formatDurationShort(d.seconds)}</div>
            </div>
            <div className="a-webtl-body">
              {sorted.length > 0 ? (
                <>
                  <div className="a-webtl-strip">
                    {sorted.map(v => {
                      const cat = DOMAIN_META[v.domain]?.cat || "Other";
                      const color = CAT_COLOR[cat];
                      return (
                        <div key={v.id} className="a-webtl-strip-seg"
                             style={{flex: v.duration, background: color}}
                             title={`${v.domain} · ${H.formatDurationShort(v.duration)}`} />
                      );
                    })}
                  </div>
                  <ul className="a-webtl-visits">
                    {sorted.slice(0, 10).map(v => {
                      const meta = DOMAIN_META[v.domain] || { cat: "Other", favicon: "?" };
                      const color = CAT_COLOR[meta.cat] || CAT_COLOR.Other;
                      return (
                        <li key={v.id} className="a-webtl-visit">
                          <span className="a-webtl-time">{H.formatClock(v.timestamp)}</span>
                          <span className="a-webtl-fav" style={{background: color}}>{meta.favicon}</span>
                          <span className="a-webtl-dom">{v.domain}</span>
                          <span className="a-webtl-title">{v.title}</span>
                          <span className="a-webtl-dur">{H.formatDurationShort(v.duration)}</span>
                        </li>
                      );
                    })}
                    {sorted.length > 10 && (
                      <li className="a-webtl-visit" style={{color:"var(--muted)", paddingLeft: 86}}>
                        +{sorted.length - 10} more visits…
                      </li>
                    )}
                  </ul>
                </>
              ) : (
                <div style={{color:"var(--muted-2)", fontSize: 12, padding: "8px 0"}}>— no browsing —</div>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// Printable full report
function WebReport() {
  const { ALL_VISITS, DOMAIN_META, CAT_COLOR } = window.__APP__;
  const params = new URLSearchParams(window.location.search);
  const fromIso = params.get("from") || new Date(Date.now() - 6*24*60*60*1000).toISOString().slice(0,10);
  const toIso   = params.get("to")   || new Date().toISOString().slice(0,10);
  const fromMs = new Date(fromIso + "T00:00:00").getTime();
  const toMs   = new Date(toIso   + "T23:59:59").getTime();
  const visits = ALL_VISITS.filter(v => {
    const t = new Date(v.timestamp).getTime();
    return t >= fromMs && t <= toMs;
  });
  const total = visits.reduce((a,v)=>a+v.duration,0);
  const uniqueDoms = new Set(visits.map(v=>v.domain)).size;

  function fmtDay(iso) {
    return new Date(iso + "T00:00:00").toLocaleDateString(undefined,{month:"long",day:"numeric",year:"numeric"});
  }

  return (
    <div className="a-report">
      <a href={window.location.pathname} className="a-report-back">← Back</a>
      <button className="a-report-print" onClick={() => window.print()}>Print / Save PDF</button>
      <div className="a-web-kicker">Web activity report</div>
      <h1>Browsing history</h1>
      <div className="a-report-sub">
        Compiled {new Date().toLocaleString()} from aw-watcher-web · local only, not sent anywhere.
      </div>

      <div className="a-report-meta">
        <div><div>Range</div><div>{fmtDay(fromIso)} → {fmtDay(toIso)}</div></div>
        <div><div>Total time</div><div>{H.formatDurationShort(total)}</div></div>
        <div><div>Domains</div><div>{uniqueDoms}</div></div>
        <div><div>Visits</div><div>{visits.length}</div></div>
      </div>

      <section className="a-report-section">
        <h2>By category</h2>
        <CategoriesView visits={visits} />
      </section>
      <section className="a-report-section">
        <h2>By domain</h2>
        <DomainsView visits={visits} />
      </section>
      <section className="a-report-section">
        <h2>Day by day</h2>
        <TimelineVisitsView visits={visits} fromIso={fromIso} toIso={toIso} />
      </section>
    </div>
  );
}

window.WebReport = WebReport;

    session.events,
    new Date(session.startedAt).getTime(),
    session.endedAt ? new Date(session.endedAt).getTime() : nowMs,

  const isActive = !session.endedAt;

  return (
    <div className={`b-task-row ${active?"b-task-active":""}`} onClick={onClick}>

function MicroTimeline({ session, nowMs }) {

  const segs = H.toSegments(session.events);
  const total = sEnd - sStart;
  return (
    <div className="b-micro">
      {segs.map((seg, i) => {
        const l = ((seg.start - sStart) / total) * 100;
        const w = ((seg.end - seg.start) / total) * 100;
        return (
          <div key={i} className="b-micro-seg" title={`${seg.app} · ${seg.title || ""}`}
               style={{ left: `${l}%`, width: `${w}%`, background: H.appColor(seg.app) }} />
        );

  );
}

function BreakdownB({ session, nowMs }) {

function DirectionC() {
